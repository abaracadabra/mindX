    <style>
        :root {
            --bg0: #000000;
            --bg1: #080a16;
            --accent: #2F80ED;
            --accent2: #56CCF2;
            --text: #ffffff;
            --muted: rgba(255,255,255,.72);
            --border: #30363d;
            --card-bg: rgba(27, 31, 35, 0.92);
            --shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            --shadow-hover: 0 8px 16px rgba(0, 0, 0, 0.4);
            --transition: all 0.3s ease;
            --success: #00cc00;
            --warning: #ff6b35;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        #gl {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 0;
            background: radial-gradient(circle at center, #111827 0%, #000 70%);
        }

        .vignette {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            background:
                linear-gradient(to bottom, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.6) 25%, rgba(0,0,0,0.15) 50%, rgba(0,0,0,0.0) 65%, rgba(0,0,0,0.35) 100%),
                radial-gradient(1200px 700px at 50% 45%, rgba(0,0,0,0) 0%, rgba(0,0,0,.55) 70%, rgba(0,0,0,.85) 100%);
        }

        body {
            font-family: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: transparent;
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        .page { position: relative; z-index: 2; }
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }

        .nav-back {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
        }

        .nav-back a {
            display: inline-flex;
            align-items: center;
            padding: 10px 20px;
            background: var(--card-bg);
            color: var(--text);
            text-decoration: none;
            border-radius: 25px;
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
            transition: var(--transition);
        }

        .nav-back a:hover {
            background: var(--accent);
            color: #fff;
            transform: translateY(-2px);
        }

        .hero {
            text-align: center;
            padding: 80px 20px 40px;
        }


        .slogan-wrap {
            position: relative;
            display: inline-block;
            padding: 20px 40px;
            margin-bottom: 10px;
        }

        .slogan-wrap .slogan-bg {
            position: absolute;
            inset: 0;
            background: url('/gfx/allchain-logo.png') center center / contain no-repeat;
            opacity: 0.12;
            pointer-events: none;
            border-radius: 16px;
        }

        .hero .slogan {
            position: relative;
            font-size: 3rem;
            font-weight: 800;
            color: #fff;
            margin: 0;
            line-height: 1.2;
            text-shadow: 0 0 30px rgba(47, 128, 237, 0.5), 0 2px 4px rgba(0,0,0,0.5);
        }

        .hero .slogan .allchain-text {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 12px rgba(47, 128, 237, 0.4));
        }

        .hero .slogan .slogan-sm {
            font-size: 1.6rem;
            font-weight: 600;
            color: var(--accent2);
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--muted);
            max-width: 600px;
            margin: 0 auto 20px;
        }

        /* Wallet connect button */
        .wallet-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 36px;
            border: 2px solid var(--success);
            border-radius: 30px;
            background: transparent;
            color: var(--success);
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .wallet-btn:hover {
            background: var(--success);
            color: #000;
            box-shadow: 0 0 20px rgba(0, 204, 0, 0.3);
        }

        .wallet-btn.connected {
            background: rgba(0, 204, 0, 0.15);
            border-color: var(--success);
            color: var(--success);
            padding: 10px 28px;
            font-size: 0.95rem;
        }

        .wallet-btn .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: currentColor;
        }

        .wallet-btn.connected .dot {
            box-shadow: 0 0 8px var(--success);
            animation: pulse 2s infinite;
        }

        .wallet-address {
            font-family: monospace;
            font-size: 0.85rem;
            color: var(--accent2);
            margin-bottom: 8px;
            min-height: 1.2em;
            letter-spacing: 0.5px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Wallet hover card */
        .wallet-wrap { position: relative; display: inline-block; }

        .wallet-hover-card {
            position: absolute;
            top: calc(100% + 10px);
            left: 50%;
            transform: translateX(-50%) translateY(6px);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.25s, transform 0.25s, visibility 0.25s;
            pointer-events: none;
            z-index: 200;
            background: rgba(10, 13, 22, 0.96);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 18px;
            min-width: 260px;
            max-width: 340px;
            backdrop-filter: blur(24px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
            font-size: 0.8rem;
            color: var(--muted);
            line-height: 1.6;
            text-align: left;
        }
        .wallet-hover-card::after {
            content: '';
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            border: 6px solid transparent;
        }
        .wallet-wrap .wallet-hover-card::after {
            top: -12px;
            border-bottom-color: var(--border);
        }
        .wallet-wrap:hover .wallet-hover-card {
            opacity: 1; visibility: visible;
            transform: translateX(-50%) translateY(0);
        }
        .stat-wallet-card { position: relative; overflow: visible !important; }
        .stat-wallet-card .wallet-hover-card {
            top: auto;
            bottom: calc(100% + 10px);
            transform: translateX(-50%) translateY(-6px);
        }
        .stat-wallet-card .wallet-hover-card::after {
            top: auto;
            bottom: -12px;
            border-bottom-color: transparent;
            border-top-color: var(--border);
        }
        .stat-wallet-card:hover .wallet-hover-card {
            opacity: 1; visibility: visible;
            transform: translateX(-50%) translateY(0);
        }
        .wallet-hover-card .wh-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding: 2px 0;
        }
        .wallet-hover-card .wh-label { color: rgba(255,255,255,0.45); white-space: nowrap; }
        .wallet-hover-card .wh-val {
            color: var(--text);
            font-family: 'Fira Code', monospace;
            font-size: 0.76rem;
            text-align: right;
            word-break: break-all;
        }
        .wallet-hover-card .wh-action {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid rgba(255,255,255,0.08);
            text-align: center;
            font-size: 0.75rem;
            letter-spacing: 0.3px;
        }
        .wallet-hover-card .wh-action.connect { color: var(--success); }
        .wallet-hover-card .wh-action.disconnect { color: #ff6b6b; }
        .wallet-hover-card .wh-title {
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
            font-size: 0.82rem;
        }

        /* Config bar */
        .config-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding: 12px 16px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            backdrop-filter: blur(10px);
            font-size: 0.85rem;
        }

        .config-bar label { color: var(--muted); white-space: nowrap; }
        .config-bar input[type="text"] {
            flex: 1;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 6px 10px;
            color: var(--text);
            font-family: monospace;
            font-size: 0.85rem;
        }

        /* Search */
        .search-section {
            margin-bottom: 30px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .search-box input {
            flex: 1;
            padding: 14px 20px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 1rem;
            backdrop-filter: blur(10px);
            transition: var(--transition);
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(47, 128, 237, 0.2);
        }

        .search-box input::placeholder { color: rgba(255,255,255,0.4); }

        .filter-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            font-size: 0.85rem;
            transition: var(--transition);
            font-family: inherit;
        }

        .filter-btn.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .filter-btn:hover {
            border-color: var(--accent);
            color: var(--text);
        }

        /* MarketCap toggle — bitcoin orange default, green when active */
        .filter-btn.mcap-toggle {
            border-color: #f7931a;
            color: #f7931a;
            font-weight: 600;
        }

        .filter-btn.mcap-toggle:hover {
            background: rgba(247, 147, 26, 0.15);
            border-color: #f7931a;
            color: #f7931a;
        }

        .filter-btn.mcap-toggle.active {
            background: rgba(0, 204, 0, 0.2);
            border-color: var(--success);
            color: var(--success);
        }

        .filter-btn.mcap-toggle.active:hover {
            background: rgba(0, 204, 0, 0.3);
        }

        /* DEX toggle — bitcoin orange default, green when active */
        .filter-btn.dex-toggle {
            border-color: #f7931a;
            color: #f7931a;
            font-weight: 600;
        }
        .filter-btn.dex-toggle:hover {
            background: rgba(247, 147, 26, 0.15);
            border-color: #f7931a;
            color: #f7931a;
        }
        .filter-btn.dex-toggle.active {
            background: rgba(0, 204, 0, 0.2);
            border-color: var(--success);
            color: var(--success);
        }
        .filter-btn.dex-toggle.active:hover {
            background: rgba(0, 204, 0, 0.3);
        }

        /* Stats */
        .stats-row {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .stat-card {
            flex: 1;
            min-width: 120px;
            padding: 16px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .stat-card .value {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-card .label {
            font-size: 0.8rem;
            color: var(--muted);
            margin-top: 4px;
        }

        /* Chain grid */
        .chain-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
            margin-bottom: 30px;
        }

        .chain-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(10px);
            transition: var(--transition);
            cursor: pointer;
        }

        .chain-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
            border-color: var(--accent);
        }

        .chain-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .chain-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(47, 128, 237, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
        }

        .chain-icon img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }

        .chain-icon .fallback {
            font-size: 1.2rem;
            color: var(--accent);
            font-weight: 700;
        }

        .chain-name {
            font-size: 1.1rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chain-id {
            font-size: 0.8rem;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: nowrap;
        }
        .chain-id .chain-badges {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-left: auto;
            flex-shrink: 0;
        }

        .chain-meta {
            display: flex;
            gap: 16px;
            margin-bottom: 12px;
            font-size: 0.85rem;
            color: var(--muted);
            flex-wrap: wrap;
        }

        .chain-meta span { display: flex; align-items: center; gap: 4px; }

        /* Connection badge on card — only shown when wallet connected to that chain */
        /* chain-badges now lives inside .chain-id row */

        .chain-type-badge {
            font-size: 0.65rem;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .chain-type-badge.l1 {
            background: rgba(47, 128, 237, 0.15);
            color: var(--accent2);
            border: 1px solid rgba(47, 128, 237, 0.3);
        }

        .chain-type-badge.l2 {
            background: rgba(155, 89, 255, 0.15);
            color: #b388ff;
            border: 1px solid rgba(155, 89, 255, 0.3);
        }

        .chain-type-badge.sidechain {
            background: rgba(255, 152, 0, 0.15);
            color: #ffb74d;
            border: 1px solid rgba(255, 152, 0, 0.3);
        }

        .chain-type-badge.appchain {
            background: rgba(0, 230, 118, 0.15);
            color: #69f0ae;
            border: 1px solid rgba(0, 230, 118, 0.3);
        }

        .chain-type-badge.testnet {
            background: rgba(255, 255, 255, 0.08);
            color: var(--muted);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .chain-connected-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.65rem;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 10px;
            background: rgba(0, 204, 0, 0.15);
            color: var(--success);
            border: 1px solid rgba(0, 204, 0, 0.3);
        }

        .chain-connected-badge .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 6px var(--success);
        }

        /* RPC expandable toggle */
        .rpc-toggle {
            cursor: pointer;
            user-select: none;
            color: var(--accent2);
            transition: color 0.2s;
        }
        .rpc-toggle:hover { color: var(--accent); }
        .rpc-toggle .rpc-arrow {
            display: inline-block;
            transition: transform 0.2s;
            font-size: 0.7em;
            margin-left: 2px;
        }
        .rpc-toggle.open .rpc-arrow { transform: rotate(90deg); }
        .rpc-panel {
            display: none;
            margin-top: 8px;
            padding: 10px 12px;
            background: rgba(0,0,0,0.35);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: 'Fira Code', monospace;
            font-size: 0.72rem;
            line-height: 1.8;
            word-break: break-all;
        }
        .rpc-panel.open { display: block; }
        .rpc-panel .rpc-url {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--muted);
        }
        .rpc-panel .rpc-url::before {
            content: '';
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--accent2);
            flex-shrink: 0;
        }
        .rpc-panel .rpc-loading {
            color: rgba(255,255,255,0.4);
            font-style: italic;
            font-family: inherit;
        }

        /* Contracts expandable toggle */
        .contracts-toggle {
            cursor: pointer;
            user-select: none;
            color: #00cc88;
            transition: color 0.2s;
        }
        .contracts-toggle:hover { color: #00ffaa; }
        .contracts-toggle .ct-arrow {
            display: inline-block;
            transition: transform 0.2s;
            font-size: 0.7em;
            margin-left: 2px;
        }
        .contracts-toggle.open .ct-arrow { transform: rotate(90deg); }
        .contracts-panel {
            display: none;
            margin-top: 8px;
            padding: 10px 12px;
            background: rgba(0,40,20,0.35);
            border: 1px solid rgba(0,204,136,0.2);
            border-radius: 8px;
            font-family: 'Fira Code', monospace;
            font-size: 0.68rem;
            line-height: 1.6;
            max-height: 300px;
            overflow-y: auto;
        }
        .contracts-panel.open { display: block; }
        .contracts-panel .contract-item {
            display: flex;
            align-items: center;
            gap: 8px;

// ── Wallet Connection (Chainlist Pattern) ─────────────────
let detectedWallets = [];
let walletsReady = false;

function setupEIP6963WalletDetection() {
    return new Promise((resolve) => {
        let eventCount = 0;
        function onAnnouncement(event) {
            eventCount++;
            const { info, provider } = event.detail;
            if (detectedWallets.some(wallet => wallet.uuid === info.uuid)) return;
            detectedWallets.push({ name: info.name, provider: provider, icon: info.icon, id: info.walletId, uuid: info.uuid });
        }
        window.addEventListener('eip6963:announceProvider', onAnnouncement);
        window.dispatchEvent(new Event('eip6963:requestProvider'));
        setTimeout(() => {
            window.removeEventListener('eip6963:announceProvider', onAnnouncement);
            const legacyWallets = detectLegacyWallets();
            for (const wallet of legacyWallets) {
                if (!detectedWallets.some(w => w.id === wallet.id)) detectedWallets.push(wallet);
            }
            walletsReady = true;
            updateWalletHovers();
            resolve(detectedWallets);
        }, 800);
    });
}

function detectLegacyWallets() {
    const wallets = [];
    // Check providers[] FIRST — window.ethereum is a proxy that causes selectExtension errors
    if (window.ethereum && window.ethereum.providers && Array.isArray(window.ethereum.providers)) {
        window.ethereum.providers.forEach((provider) => {
            if (provider.isMetaMask && !wallets.some(w => w.id === 'metamask')) {
                wallets.push({ name: 'MetaMask', provider: provider, icon: '🦊', id: 'metamask', uuid: 'metamask-from-providers' });
            }
            if (provider.isCoinbaseWallet && !wallets.some(w => w.id === 'coinbase')) {
                wallets.push({ name: 'Coinbase Wallet', provider: provider, icon: '🔵', id: 'coinbase', uuid: 'coinbase-from-providers' });
            }
        });
    }
    if (!wallets.some(w => w.id === 'metamask') && window.ethereum && window.ethereum.isMetaMask) {
        wallets.push({ name: 'MetaMask', provider: window.ethereum, icon: '🦊', id: 'metamask', uuid: 'metamask-legacy' });
    }
    if (window.phantom && window.phantom.ethereum) {
        wallets.push({ name: 'Phantom', provider: window.phantom.ethereum, icon: '👻', id: 'phantom', uuid: 'phantom-legacy' });
    }
    if (!wallets.some(w => w.id === 'coinbase') && window.ethereum && window.ethereum.isCoinbaseWallet) {
        wallets.push({ name: 'Coinbase Wallet', provider: window.ethereum, icon: '🔵', id: 'coinbase', uuid: 'coinbase-legacy' });
    }
    if (wallets.length === 0 && window.ethereum) {
        wallets.push({ name: 'Ethereum Wallet', provider: window.ethereum, icon: '💎', id: 'ethereum', uuid: 'ethereum-legacy' });
    }
    return wallets;
}

async function detectWallets() {
    if (!walletsReady) await setupEIP6963WalletDetection();
    return detectedWallets;
}

function getWalletProvider() {
    if (detectedWallets && detectedWallets.length > 0) {
        const mm = detectedWallets.find(w => w.id === 'metamask' || w.name === 'MetaMask');
        if (mm) return mm.provider;
        return detectedWallets[0].provider;
    }
    const legacy = detectLegacyWallets();
    if (legacy.length > 0) {
        const mm = legacy.find(w => w.id === 'metamask');
        if (mm) return mm.provider;
        return legacy[0].provider;
    }
    return null;
}

// ── Wallet Connect ────────────────────────────────────────────────
async function connectWallet() {
    const btn = document.getElementById('walletBtn');
    const label = document.getElementById('walletBtnLabel');

    if (walletConnected) {
        await disconnectWallet();
        return;
    }

    // Ensure detection has run
    if (!walletsReady) await detectWallets();

    const provider = getWalletProvider();
    if (!provider) {
        alert('MetaMask or a compatible EVM wallet is required.\n\nInstall MetaMask from https://metamask.io');
        return;
    }

    try {
        label.textContent = 'Connecting...';
        console.log('🔗 Using provider:', provider.constructor?.name, provider.isMetaMask ? '(MetaMask)' : '');

        const accounts = await provider.request({ method: 'eth_requestAccounts' });
        if (accounts && accounts.length > 0) {
            connectedAddress = accounts[0];
            const chainIdHex = await provider.request({ method: 'eth_chainId' });
            connectedChainId = parseInt(chainIdHex, 16);
            walletConnected = true;

            btn.classList.add('connected');
            const short = connectedAddress.slice(0, 6) + '...' + connectedAddress.slice(-4);
            label.textContent = short;
            document.getElementById('walletAddress').textContent = connectedAddress;

            walletChains.add(connectedChainId);
            saveWalletChains();

            try {
                provider.on('accountsChanged', (accts) => {
                    if (!accts.length) disconnectWallet();
                    else { connectedAddress = accts[0]; renderChains(); }
                });
                provider.on('chainChanged', (cid) => {
                    connectedChainId = parseInt(cid, 16);
                    walletChains.add(connectedChainId);
                    saveWalletChains();
                    renderChains();
                    updateStats();
                });
            } catch {}

            updateStats();
            renderChains();
            console.log(`✅ Connected: ${connectedAddress} on chain ${connectedChainId}`);
        }
    } catch (err) {
        console.error('Wallet connect failed:', err);
        label.textContent = 'Connect Wallet';
        if (err.code === 4001) { /* User rejected */ }
        else { alert('Failed to connect wallet: ' + err.message); }
    }
}

function saveWalletChains() {
    localStorage.setItem('walletChains', JSON.stringify([...walletChains]));
}

async function disconnectWallet() {
    const provider = getWalletProvider();
    if (provider) {
        try { await provider.request({ method: 'wallet_revokePermissions', params: [{ eth_accounts: {} }] }); } catch {}
        try { provider.removeAllListeners?.('accountsChanged'); provider.removeAllListeners?.('chainChanged'); } catch {}
    }

    walletConnected = false;
    connectedChainId = null;
    connectedAddress = null;
    walletChains.clear();
    saveWalletChains();

    const btn = document.getElementById('walletBtn');
    btn.classList.remove('connected');
    document.getElementById('walletBtnLabel').textContent = 'Connect Wallet';
    document.getElementById('walletAddress').textContent = '';

    updateStats();
    renderChains();
}

async function addToMetaMask(chainId) {
    const provider = getWalletProvider();
    if (!provider) {
        alert('MetaMask or a compatible wallet is required.\n\nInstall MetaMask from https://metamask.io');
        return;
    }
    if (!walletConnected) {
        await connectWallet();
        if (!walletConnected) return;
    }

    const chain = allChains.find(c => c.chainId === chainId);
    if (!chain) { alert('Chain not found. Please refresh.'); return; }

    const statusEl = document.getElementById('statusMsg');
    const showStatus = (msg) => { statusEl.style.display = 'block'; statusEl.textContent = msg; };

    showStatus(`Preparing ${chain.name}...`);
    showStatus(`Adding ${chain.name} to wallet...`);

    let params = null;

    // Strategy 1: Try API metamask endpoint
    try {
        const ctrl = new AbortController();
        setTimeout(() => ctrl.abort(), 5000);
        const res = await fetch(`${getApiUrl()}/chains/${chainId}/metamask`, { signal: ctrl.signal });
        if (res.ok) {
            const apiParams = await res.json();
            if (apiParams.rpcUrls && apiParams.rpcUrls.length > 0) {
                params = apiParams;
                console.log('Got params from API metamask endpoint');
            }
        }
    } catch (e) { console.log('API metamask endpoint failed:', e.message); }

    // Strategy 2: Build from local chain data + on-demand fetch
    if (!params) {
        let rpcUrls = [];

        // Use locally cached RPCs (from CDN load)
        if (chain.rpc && Array.isArray(chain.rpc) && chain.rpc.length > 0) {
            rpcUrls = chain.rpc.filter(r => typeof r === 'string' && r.startsWith('http') && !r.includes('${'));
            if (rpcUrls.length > 0) console.log(`Got ${rpcUrls.length} RPCs from local cache`);
        }

        // On-demand: fetch from API detail
        if (rpcUrls.length === 0) {
            showStatus(`Fetching RPC data for ${chain.name}...`);
            try {
                const ctrl = new AbortController();
                setTimeout(() => ctrl.abort(), 5000);
                const res = await fetch(`${getApiUrl()}/chains/${chainId}`, { signal: ctrl.signal });
                if (res.ok) {
                    const detail = await res.json();
                    if (detail.rpcUrls && detail.rpcUrls.length > 0) {
                        rpcUrls = detail.rpcUrls;
                        chain.rpc = rpcUrls;
                        console.log(`Got ${rpcUrls.length} RPCs from API detail`);
                    }
                    if (detail.explorers && detail.explorers.length > 0) chain.explorers = detail.explorers;
                }
            } catch (e) { console.log('API detail failed:', e.message); }
        }

        // On-demand: fetch from CDN
        if (rpcUrls.length === 0) {
            showStatus(`Fetching RPCs from chainid.network...`);
            try {
                const ctrl = new AbortController();
                setTimeout(() => ctrl.abort(), 8000);
                const res = await fetch(CDN_URL, { signal: ctrl.signal });
                if (res.ok) {
                    const cdnChains = await res.json();
                    const cdnChain = cdnChains.find(c => c.chainId === chainId);
                    if (cdnChain && cdnChain.rpc) {
                        rpcUrls = cdnChain.rpc.filter(r => typeof r === 'string' && r.startsWith('https') && !r.includes('${'));
                        chain.rpc = rpcUrls;
                        if (cdnChain.explorers) chain.explorers = cdnChain.explorers;
                        console.log(`Got ${rpcUrls.length} RPCs from CDN for chain ${chainId}`);
                    } else {
                        console.log(`Chain ${chainId} not found in CDN data`);
                    }
                }
            } catch (e) { console.log('CDN fetch failed:', e.message); }
        }

        // Last resort: generic fallback
        if (rpcUrls.length === 0) {
            const sn = chain.shortName || chain.name.toLowerCase().replace(/[\s\-\.]/g, '');
            rpcUrls = [`https://rpc.ankr.com/${sn}`, `https://${sn}.public-rpc.com`];
            console.log('Using generic fallback RPCs:', rpcUrls);
        }

        let blockExplorerUrls = [];
        if (chain.explorers && Array.isArray(chain.explorers)) {
            blockExplorerUrls = chain.explorers.filter(e => e && e.url).slice(0, 2).map(e => e.url);
        }

        params = {
            chainId: '0x' + chainId.toString(16),
            chainName: chain.name,
            nativeCurrency: chain.nativeCurrency || { name: 'ETH', symbol: 'ETH', decimals: 18 },
            rpcUrls: rpcUrls
        };
        if (blockExplorerUrls.length > 0) params.blockExplorerUrls = blockExplorerUrls;
    }

    console.log('Final wallet_addEthereumChain params:', JSON.stringify(params, null, 2));

    // Show professional confirmation dialog before MetaMask popup
    const confirmResult = await showChainConfirmDialog(params, chain);
    if (!confirmResult) {
        showStatus('Chain addition cancelled');
        setTimeout(() => { statusEl.style.display = 'none'; }, 3000);
        return;
    }

    // Apply user's RPC selection
    if (confirmResult.selectedRpcs) {
        params.rpcUrls = confirmResult.selectedRpcs;
    }

    const wasInWallet = confirmResult.alreadyInWallet;
    showStatus(wasInWallet
        ? `Updating ${params.chainName} configuration...`
        : `Requesting wallet to add ${params.chainName}...`);

    try {
        await provider.request({
            method: 'wallet_addEthereumChain',
            params: [params],
        });
        const currentHex = await provider.request({ method: 'eth_chainId' });
        connectedChainId = parseInt(currentHex, 16);
        const addedId = parseInt(params.chainId, 16);
        walletChains.add(addedId);
        walletChains.add(connectedChainId);
        saveWalletChains();

        if (wasInWallet) {
            showStatus(`${params.chainName} updated — ${params.rpcUrls.length} RPCs, ${(params.blockExplorerUrls||[]).length} explorer(s) synced to wallet`);
            console.log(`Updated existing chain ${addedId} with ${params.rpcUrls.length} RPCs`);
        } else {
            showStatus(`${params.chainName} added to wallet!`);
        }
        setTimeout(() => { statusEl.style.display = 'none'; }, 4000);
        renderChains();
        updateStats();
    } catch (err) {
        console.error('wallet_addEthereumChain failed:', err);
        statusEl.style.display = 'none';
        const msg = err.code === 4001 ? 'Cancelled by user'
            : err.code === -32002 ? 'Check your wallet — request pending'
            : err.message || 'Unknown error';
        alert('Failed to add chain: ' + msg);
    }
}

function showChainConfirmDialog(params, chain) {
    return new Promise(async (resolve) => {
        const backdrop = document.getElementById('chainConfirmBackdrop');
        const provider = getWalletProvider();
        const chainIdInt = parseInt(params.chainId, 16);

        // Check if chain is already known to be in the wallet
        let alreadyInWallet = walletChains.has(chainIdInt);

        const iconSrc = chain.icon
            ? (chain.icon.startsWith('http') || chain.icon.startsWith('/') ? chain.icon : getApiUrl() + chain.icon)
            : '';
        const iconHtml = iconSrc
            ? `<img src="${iconSrc}" alt="${params.chainName}" onerror="this.parentElement.textContent='${(chain.chain || params.chainName || '?')[0]}'">`
            : (chain.chain || params.chainName || '?')[0];

        const rpcItems = params.rpcUrls.map((url, i) => {
            let host;
            try { host = new URL(url).hostname; } catch { host = url; }
            const badge = i === 0 ? '<span class="rpc-badge primary">primary</span>'
                : host.includes('publicnode') || host.includes('public') || host.includes('ankr') ? '<span class="rpc-badge public">public</span>' : '';

// ── IndexedDB Cache ───────────────────────────────────────────────
const IDB_NAME = 'allchainz';
const IDB_STORE = 'chains';
const IDB_VERSION = 1;

function openIDB() {
    return new Promise((resolve, reject) => {
        const req = indexedDB.open(IDB_NAME, IDB_VERSION);
        req.onupgradeneeded = () => {
            const db = req.result;
            if (!db.objectStoreNames.contains(IDB_STORE)) {
                db.createObjectStore(IDB_STORE, { keyPath: 'id' });
            }
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
    });
}

async function saveToIDB(chains) {
    try {
        const db = await openIDB();
        const tx = db.transaction(IDB_STORE, 'readwrite');
        const store = tx.objectStore(IDB_STORE);
        store.clear();
        store.put({ id: 'chains', data: chains, ts: Date.now() });
        db.close();
    } catch (e) { /* IndexedDB unavailable — silent */ }
}

async function loadFromIDB() {
    try {
        const db = await openIDB();
        return new Promise((resolve) => {
            const tx = db.transaction(IDB_STORE, 'readonly');
            const req = tx.objectStore(IDB_STORE).get('chains');
            req.onsuccess = () => {
                db.close();
                resolve(req.result ? req.result.data : null);
            };
            req.onerror = () => { db.close(); resolve(null); };
        });
    } catch (e) { return null; }
}

// ── CDN Fallback ──────────────────────────────────────────────────
const CDN_URL = 'https://chainid.network/chains.json';

function normalizeCDNChain(c) {
    const usableRpcs = (c.rpc || []).filter(r => typeof r === 'string' && r.startsWith('http') && !r.includes('${'));
    return {
        chainId: c.chainId,
        name: c.name,
        chain: c.chain || c.shortName || '',
        nativeCurrency: c.nativeCurrency || { name: 'Ether', symbol: 'ETH', decimals: 18 },
        rpc: usableRpcs,
        rpcCount: usableRpcs.length,
        explorers: c.explorers || [],
        faucetCount: (c.faucets || []).length,
        explorerCount: (c.explorers || []).length,
        infoUrl: c.infoURL || '',
        shortName: c.shortName || '',
        icon: '/gfx/chains/' + c.chainId + '.png',
        features: c.features || [],
        source: 'cdn'
    };
}

async function fetchFromCDN() {
    const controller = new AbortController();
    setTimeout(() => controller.abort(), 10000);
    const res = await fetch(CDN_URL, { signal: controller.signal });
    if (!res.ok) throw new Error(`CDN returned ${res.status}`);
    const raw = await res.json();
    return raw.map(normalizeCDNChain);
}

const PRICE_REFRESH_INTERVAL = COINGECKO_API_KEY ? 2 * 60 * 1000 : 5 * 60 * 1000;

async function fetchCoinGeckoPrices() {

    const allIds = new Set([...Object.values(CHAIN_COINGECKO_MAP), ...Object.values(CHAIN_PROTOCOL_MAP)]);
    const ids = [...allIds].join(',');
    let url = `https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${ids}&order=market_cap_desc&per_page=250&sparkline=false`;
    if (COINGECKO_API_KEY) {
        url = `https://pro-api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${ids}&order=market_cap_desc&per_page=250&sparkline=false&x_cg_pro_api_key=${COINGECKO_API_KEY}`;
    }

    try {
        const controller = new AbortController();
        setTimeout(() => controller.abort(), 10000);
        const res = await fetch(url, { signal: controller.signal });
        if (!res.ok) return false;
        const coins = await res.json();
        lastCoinGeckoFetch = Date.now();

        const coinMap = {};
        coins.forEach(c => { coinMap[c.id] = c; });

        // Enrich allChains with market data
        // L2s where native token is ETH/BNB/BTC/XRP/ADA — don't assign parent chain market cap
        const l2NativeChains = new Set(Object.keys(CHAIN_PROTOCOL_MAP).map(Number).concat([
            200901, 204, 1101, 1440000, 1868, 1890, 2001, 5112, 7560,
            7777777, 7887, 8453, 27563, 42170, 48900,
            888888888, 1380012617, 10241024
        ]));
        allChains.forEach(chain => {
            const geckoId = CHAIN_COINGECKO_MAP[chain.chainId];
            if (!geckoId) return;
            const coin = coinMap[geckoId];
            if (!coin) return;

            chain.nativePrice = coin.current_price;
            chain.priceChange24h = coin.price_change_percentage_24h;

            // L2s using ETH/BNB as gas: don't assign ETH's market cap to them
            const isL2 = l2NativeChains.has(chain.chainId);
            const protoId = CHAIN_PROTOCOL_MAP[chain.chainId];
            const protoCoin = protoId ? coinMap[protoId] : null;

            if (protoCoin && protoCoin.id !== geckoId) {
                chain.marketCap = protoCoin.market_cap || 0;
                chain.volume24h = protoCoin.total_volume || 0;
                chain.protocolSymbol = protoCoin.symbol?.toUpperCase();
                chain.protocolPrice = protoCoin.current_price;
            } else if (!isL2) {
                chain.marketCap = coin.market_cap || 0;
                chain.volume24h = coin.total_volume || 0;
            }
        });
        return true;
    } catch (e) {
        return false;
    }
}

// ── Fetch (3-tier: API → CDN → IndexedDB) ────────────────────────
async function fetchChains() {
    const statusEl = document.getElementById('statusMsg');
    statusEl.style.display = 'block';
    statusEl.className = 'status-msg loading';
    statusEl.textContent = 'Loading chain data...';

    let source = '';

    // Tier 1: Backend API
    try {
        const controller = new AbortController();
        setTimeout(() => controller.abort(), 8000);
        const res = await fetch(`${getApiUrl()}/chains?limit=5000`, { signal: controller.signal });
        if (!res.ok) throw new Error(`API returned ${res.status}`);
        const data = await res.json();
        allChains = data.chains || [];
        // Store authoritative counts from the database
        if (data.mainnets !== undefined) window._dbMainnets = data.mainnets;
        if (data.testnets !== undefined) window._dbTestnets = data.testnets;
        source = 'api';
    } catch (err) {
        // Tier 2: chainid.network CDN
        try {
            statusEl.textContent = 'API unavailable, loading from chainid.network...';
            allChains = await fetchFromCDN();
            source = 'cdn';
        } catch (cdnErr) {
            // Tier 3: IndexedDB cache
            statusEl.textContent = 'Loading from local cache...';
            const cached = await loadFromIDB();
            if (cached && cached.length > 0) {
                allChains = cached;
                source = 'cache';
            }
        }
    }

    // Enrich chains with known missing data (upstream has gaps)
    const CHAIN_ENRICHMENT = {
        1130: {
            rpc: ['https://dmc.mydefichain.com/mainnet', 'https://blockscout.mainnet.ocean.jellyfishsdk.com'],
            explorers: [{ name: 'DeFiChain Explorer', url: 'https://defiscan.live', standard: 'none' }, { name: 'Blockscout', url: 'https://blockscout.mainnet.ocean.jellyfishsdk.com', standard: 'EIP3091' }],
            infoURL: 'https://defichain.com',
        },
        1131: {
            rpc: ['https://dmc.mydefichain.com/testnet'],
            explorers: [{ name: 'DeFiChain Testnet Explorer', url: 'https://defiscan.live/testnet', standard: 'none' }],
            infoURL: 'https://defichain.com',
        },
    };
    for (const chain of allChains) {
        const enrich = CHAIN_ENRICHMENT[chain.chainId];
        if (enrich) {
            if (enrich.rpc && (!chain.rpc || chain.rpc.length === 0)) {
                chain.rpc = enrich.rpc;
                chain.rpcCount = enrich.rpc.length;
            }
            if (enrich.explorers && (!chain.explorers || chain.explorers.length === 0)) {
                chain.explorers = enrich.explorers;
                chain.explorerCount = enrich.explorers.length;
            }
            if (enrich.infoURL && !chain.infoUrl) {
                chain.infoUrl = enrich.infoURL;
                chain.infoURL = enrich.infoURL;
            }
        }
    }

    if (allChains.length > 0) {
        // Fetch prices on page load — this is the "0 moment", clock starts from here
        statusEl.textContent = 'Fetching live prices from CoinGecko...';
        await fetchCoinGeckoPrices();
        priceRefreshStatus = 'updated';
        schedulePriceRefresh(); // start the 5-min clock from NOW

        updateStats();
        applyFilter();
        saveToIDB(allChains);
        const label = source === 'api' ? 'API' : source === 'cdn' ? 'chainid.network' : 'local cache';
        statusEl.textContent = `Loaded ${allChains.length.toLocaleString()} chains from ${label}`;
        statusEl.className = 'status-msg';
        setTimeout(() => { statusEl.style.display = 'none'; }, 3000);
    } else {
        statusEl.className = 'status-msg';
        statusEl.textContent = 'No chain data available. Check API (' + getApiUrl() + '), internet, or try again later.';
    }
}

function updateStats() {
    document.getElementById('stat-total').textContent = allChains.length.toLocaleString();
    // Use authoritative DB counts when available, otherwise count from loaded data
    if (window._dbMainnets !== undefined && window._dbTestnets !== undefined) {
        document.getElementById('stat-mainnet').textContent = window._dbMainnets.toLocaleString();
        document.getElementById('stat-testnet').textContent = window._dbTestnets.toLocaleString();

    const walletLabel = document.getElementById('stat-wallet-label');

const MAINNET_WITH_FAUCETS = new Set([
    100, 122, 137, 1088, 42220, 1284, 1285, 1666600000, 369, 40, 82, 592,
    7000, 2222, 288, 42170, 1776, 32769, 108, 106, 30,
]);

function isTestnet(chain) {
    // Prefer the actual database flag when available
    if (typeof chain.testnet === 'boolean') return chain.testnet;
    // Fallback heuristics for CDN-loaded data
    if (MAINNET_WITH_FAUCETS.has(chain.chainId)) return false;
    const n = (chain.name || '').toLowerCase();
    if (n.includes('testnet') || n.includes('sepolia') || n.includes('goerli') || n.includes('devnet')) return true;
    if (n.includes('mainnet') || n.includes('main net')) return false;
    return (chain.faucetCount > 0);
}

// ── Filter & Search ────────────────────────────────────────────────
function applyFilter() {
    const q = document.getElementById('searchInput').value.toLowerCase().trim();
    let result = [...allChains];

    // Only apply mainnet/testnet filter when NOT searching
    if (!q) {
        if (currentFilter === 'mainnet') result = result.filter(c => !isTestnet(c));
        else if (currentFilter === 'testnet') result = result.filter(c => isTestnet(c));
    }

    // Filter to only chains with market cap data
    if (mcapOnly) {
        result = result.filter(c => c.marketCap && c.marketCap > 0);
    }

    // Filter to only chains with a DEX
    if (dexOnly) {
        result = result.filter(c => CHAIN_DEX_MAP[c.chainId]);
    }

    if (q) {
        const num = parseInt(q, 10);
        result = result.filter(c => {
            if (!isNaN(num) && c.chainId === num) return true;
            return (c.name || '').toLowerCase().includes(q) ||
                   (c.chain || '').toLowerCase().includes(q) ||
                   (c.nativeCurrency?.symbol || '').toLowerCase().includes(q);
        });
    }

    // Sort
    if (currentSort === 'name') result.sort(function(a,b){ return (a.name||'').localeCompare(b.name||''); });
    else if (currentSort === 'name_desc') result.sort(function(a,b){ return (b.name||'').localeCompare(a.name||''); });
    else if (currentSort === 'chainid') result.sort(function(a,b){ return a.chainId - b.chainId; });
    else if (currentSort === 'chainid_desc') result.sort(function(a,b){ return b.chainId - a.chainId; });
    else if (currentSort === 'marketcap') result.sort(function(a,b){ return (b.marketCap||0) - (a.marketCap||0); });
    else if (currentSort === 'marketcap_asc') result.sort(function(a,b){ return (a.marketCap||0) - (b.marketCap||0); });
    else if (currentSort === 'rpc_count') result.sort(function(a,b){ return (b.rpcCount||0) - (a.rpcCount||0); });

    filteredChains = result;
    displayCount = 30;
    renderChains();
}

function renderChains() {
    const grid = document.getElementById('chainGrid');
    const toShow = filteredChains.slice(0, displayCount);

    grid.innerHTML = toShow.map(chain => {
        const isConnected = walletConnected && connectedChainId === chain.chainId;
        const isInWallet = walletConnected && walletChains.has(chain.chainId) && !isConnected;
        const iconSrc = chain.icon
            ? (chain.icon.startsWith('http') || chain.icon.startsWith('/') ? chain.icon : getApiUrl() + chain.icon)
            : '';

            ? `<img src="${iconSrc}" alt="${chain.name}" onerror="this.parentElement.innerHTML='<span class=\\'fallback\\'>${(chain.chain || chain.name || '?')[0]}</span>'">`
            : `<span class="fallback">${(chain.chain || chain.name || '?')[0]}</span>`;

            ? `<span class="chain-connected-badge"><span class="dot"></span> Connected</span>`

            : '';

        const ct = (chain.chainType || 'L1').toLowerCase();
        const typeBadge = `<span class="chain-type-badge ${ct}">${chain.chainType || 'L1'}</span>`;

        // For L2s with protocol token: show protocol token as primary, ETH as secondary
        // For L1s: show native token as primary
        const hasProto = !!chain.protocolSymbol;
        let primaryToken, secondaryToken;

        if (hasProto) {
            // L2 with its own token: protocol token is primary
            primaryToken = `<span>${chain.protocolSymbol} $${formatPrice(chain.protocolPrice)}</span>`;
            secondaryToken = `<span style="opacity:0.6">${chain.nativeCurrency?.symbol || 'ETH'} $${formatPrice(chain.nativePrice)}</span>`;
        } else {
            // L1 or L2 without own token: native is primary
            primaryToken = `<span>${chain.nativeCurrency?.symbol || '\u2014'}${chain.nativePrice ? ' $' + formatPrice(chain.nativePrice) : ''}</span>`;

        return `
        <div class="chain-card" onclick="openDetailOverlay(${chain.chainId})" data-chainid="${chain.chainId}">
            <div class="chain-header">
                <div class="chain-icon">${iconHtml}</div>
                <div style="flex:1;min-width:0;">
                    <div class="chain-name">${chain.name}</div>
                    <div class="chain-id">
                        <span>Chain ID: ${chain.chainId} (0x${chain.chainId.toString(16)})</span>
                        <span class="chain-badges">
                            ${typeBadge}
                            ${(() => { const dex = CHAIN_DEX_MAP[chain.chainId]; return dex ? `<span class="chain-type-badge" style="background:${dex.color};color:#fff;font-size:0.6rem;" title="${dex.name}">${dex.badge}</span>` : ''; })()}
                            ${connectedBadge}
                        </span>
                    </div>
                </div>
            </div>
            <div class="chain-meta">
                ${primaryToken}
                ${chain.marketCap ? '<span>MCap $' + formatCompact(chain.marketCap) + '</span>' : ''}
                ${secondaryToken}
                <span class="rpc-toggle" onclick="event.stopPropagation(); toggleRpcPanel(${chain.chainId}, this)" title="RPC Endpoints">${chain.rpcCount || 0} RPCs <span class="rpc-arrow">&#9656;</span></span>
                <span>${chain.explorerCount || 0} Explorers</span>
                ${chain.verifiedContracts ? `<span class="contracts-toggle" onclick="event.stopPropagation(); toggleContractsPanel(${chain.chainId}, this)" title="Verified Smart Contracts">${formatCompact(chain.verifiedContracts)} Contracts <span class="ct-arrow">&#9656;</span></span>` : ''}
                ${chain.gasToken ? `<span class="gas-token-link" onclick="event.stopPropagation(); showGasPopup(${chain.chainId})" title="Gas token contract">${chain.gasToken.symbol}</span>` : ''}
                ${chain.priceChange24h ? '<span style="color:' + (chain.priceChange24h >= 0 ? '#00cc00' : '#ff4444') + '">' + (chain.priceChange24h >= 0 ? '+' : '') + chain.priceChange24h.toFixed(1) + '%</span>' : ''}
            </div>
            <div class="rpc-panel" id="rpc-${chain.chainId}"></div>
            <div class="contracts-panel" id="contracts-${chain.chainId}"></div>
            <div class="chain-actions">
                ${chain.nonEvm
                    ? `<button class="chain-btn primary btc-info-btn" style="background:#f7931a;" data-action="btcinfo">&#8383; Bitcoin in MetaMask</button>`
                    : `<button class="chain-btn primary" onclick="event.stopPropagation(); addToMetaMask(${chain.chainId})">Add to Wallet</button>`
                }
                ${(() => { const dex = CHAIN_DEX_MAP[chain.chainId]; return dex ? `<button class="chain-btn" style="color:${dex.color};border-color:${dex.color}33;" onclick="event.stopPropagation(); window.open('${dex.url}','_blank')" title="Swap on ${dex.name}">${dex.name}</button>` : ''; })()}
                <button class="chain-btn" onclick="event.stopPropagation(); openDetailOverlay(${chain.chainId})">
                    Details &#9662;
                </button>
            </div>
        </div>`;
    }).join('');

    const loadMoreEl = document.getElementById('loadMore');
    loadMoreEl.style.display = displayCount < filteredChains.length ? 'block' : 'none';

    // Auto-fit chain names — shrink font so every name is one line, no wrapping
    document.querySelectorAll('.chain-name').forEach(el => {
        el.style.fontSize = ''; // reset
        const parent = el.parentElement;
        if (!parent) return;
        const maxW = parent.clientWidth;
        if (el.scrollWidth > maxW) {
            const ratio = maxW / el.scrollWidth;
            const newSize = Math.max(0.65, 1.1 * ratio);
            el.style.fontSize = newSize + 'rem';
        }
    });
}

function loadMoreChains() {
    if (displayCount >= filteredChains.length) return;
    displayCount += 30;
    renderChains();
}

// ── RPC Endpoint Toggle ──────────────────────────────────────────
const _rpcCache = {};

async function toggleRpcPanel(chainId, toggleEl) {
    const panel = document.getElementById('rpc-' + chainId);
    if (!panel) return;
    const isOpen = panel.classList.contains('open');

    // Close: just collapse
    if (isOpen) {
        panel.classList.remove('open');
        toggleEl.classList.remove('open');
        return;
    }

    // Open
    toggleEl.classList.add('open');
    panel.classList.add('open');

    // Already loaded
    if (_rpcCache[chainId]) {
        renderRpcPanel(panel, _rpcCache[chainId]);
        return;
    }

    // Show loading state
    panel.innerHTML = '<span class="rpc-loading">Loading endpoints...</span>';

    // Fetch from API detail endpoint
    try {
        const ctrl = new AbortController();
        setTimeout(() => ctrl.abort(), 6000);
        const res = await fetch(`${getApiUrl()}/chains/${chainId}`, { signal: ctrl.signal });
        if (res.ok) {
            const detail = await res.json();
            const rpcs = (detail.rpcUrls || []).filter(u => typeof u === 'string' && u.startsWith('https'));
            _rpcCache[chainId] = rpcs;
            renderRpcPanel(panel, rpcs);
            // Also cache on the chain object for addToMetaMask
            const chain = allChains.find(c => c.chainId === chainId);
            if (chain && rpcs.length > 0) { chain.rpc = rpcs; chain.rpcCount = rpcs.length; }
            return;
        }
    } catch (e) { /* fall through */ }

    // Fallback: check local chain data
    const chain = allChains.find(c => c.chainId === chainId);
    if (chain && chain.rpc && chain.rpc.length > 0) {
        _rpcCache[chainId] = chain.rpc;
        renderRpcPanel(panel, chain.rpc);
    } else {
        panel.innerHTML = '<span class="rpc-loading">No endpoints available — open Details for more info</span>';
    }
}

function renderRpcPanel(panel, rpcs) {
    if (!rpcs || rpcs.length === 0) {
        panel.innerHTML = '<span class="rpc-loading">No public RPC endpoints found</span>';
        return;
    }
    panel.innerHTML = rpcs.map(url => `<div class="rpc-url">${url}</div>`).join('');
}

// ── Verified Contracts Toggle ────────────────────────────────────
const _contractsCache = {};

async function toggleContractsPanel(chainId, toggleEl) {
    const panel = document.getElementById('contracts-' + chainId);
    if (!panel) return;
    const isOpen = panel.classList.contains('open');

    if (isOpen) {
        panel.classList.remove('open');
        toggleEl.classList.remove('open');
        return;
    }

    toggleEl.classList.add('open');
    panel.classList.add('open');

    if (_contractsCache[chainId]) {
        renderContractsPanel(panel, _contractsCache[chainId], chainId);
        return;
    }

    panel.innerHTML = '<span class="contracts-loading">Loading verified contracts...</span>';

    try {
        const ctrl = new AbortController();
        setTimeout(() => ctrl.abort(), 8000);
        const res = await fetch(`${getApiUrl()}/chains/${chainId}/contracts?limit=20`, { signal: ctrl.signal });
        if (res.ok) {
            const data = await res.json();
            _contractsCache[chainId] = data;
            renderContractsPanel(panel, data, chainId);
            return;
        }
    } catch (e) { /* fall through */ }

    panel.innerHTML = '<span class="contracts-loading">No contract data available — run Blockscout sync to populate</span>';
}

function renderContractsPanel(panel, data, chainId) {
    if (!data || !data.contracts || data.contracts.length === 0) {
        const chain = allChains.find(c => c.chainId === chainId);
        const bsUrl = chain?.blockscoutUrl || data?.blockscoutUrl;
        panel.innerHTML = `<span class="contracts-loading">No indexed contracts yet${bsUrl ? ` — <a href="${bsUrl}" target="_blank" rel="noopener">view on Blockscout</a>` : ''}</span>`;
        return;
    }

    let html = data.contracts.map(c => {
        const addr = c.address;
        const shortAddr = addr.slice(0, 6) + '...' + addr.slice(-4);
        const chain = allChains.find(ch => ch.chainId === chainId);
        const bsUrl = chain?.blockscoutUrl || data?.blockscoutUrl;
        const addrLink = bsUrl ? `<a href="${bsUrl}/address/${addr}" target="_blank" rel="noopener" style="color:inherit;" onclick="event.stopPropagation()">${shortAddr}</a>` : shortAddr;
        return `<div class="contract-item">
            <span class="contract-name" title="${c.name || 'unnamed'}">${c.name || 'unnamed'}</span>
            <span class="contract-addr">${addrLink}</span>
            ${c.language ? `<span class="contract-lang">${c.language}</span>` : ''}
            ${c.proxy ? `<span class="contract-proxy" title="${c.proxy.type}">${c.proxy.implementationName || 'proxy'}</span>` : ''}
        </div>`;
    }).join('');

    // Footer with totals and Blockscout link
    const chain = allChains.find(c => c.chainId === chainId);
    const bsUrl = chain?.blockscoutUrl || data?.blockscoutUrl;
    const totalVerified = data.verifiedOnChain ? formatCompact(data.verifiedOnChain) : data.total;
    html += `<div class="contracts-footer">
        ${totalVerified ? `${totalVerified} verified contracts on chain` : ''}
        ${data.total > data.contracts.length ? ` (showing ${data.contracts.length})` : ''}
        ${bsUrl ? ` &middot; <a href="${bsUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Blockscout</a>` : ''}
    </div>`;

    panel.innerHTML = html;
}

// ── Gas Token Contract Popup ─────────────────────────────────────
async function showGasPopup(chainId) {
    const chain = allChains.find(c => c.chainId === chainId);
    if (!chain || !chain.gasToken) return;

    const gt = chain.gasToken;
    const contract = gt.contract;
    const sourceBadge = gt.source === 'blockscout'
        ? '<span class="gp-badge blockscout">Blockscout verified</span>'
        : '<span class="gp-badge canonical">Canonical</span>';

    // Fetch explorer URL from chain detail if not cached
    let explorerLink = '';
    if (chain.explorers && chain.explorers.length > 0) {
        const url = (chain.explorers[0].url || chain.explorers[0]).replace(/\/+$/, '');
        explorerLink = url + '/address/' + contract;
    } else if (chain.explorerCount > 0) {
        try {
            const ctrl = new AbortController();
            setTimeout(() => ctrl.abort(), 4000);
            const res = await fetch(`${getApiUrl()}/chains/${chainId}`, { signal: ctrl.signal });
            if (res.ok) {
                const detail = await res.json();
                if (detail.explorers && detail.explorers.length > 0) {
                    chain.explorers = detail.explorers;
                    const url = (detail.explorers[0].url || '').replace(/\/+$/, '');
                    if (url) explorerLink = url + '/address/' + contract;
                }
            }
        } catch (e) { /* proceed without explorer link */ }
    }

    const content = document.getElementById('gasPopupContent');
    content.innerHTML =
        `<div class="gp-title">${chain.name} Gas Token ${sourceBadge}</div>`
      + `<div class="gp-row"><span class="gp-label">Native</span><span class="gp-val">${chain.nativeCurrency?.symbol || '?'}</span></div>`
      + `<div class="gp-row"><span class="gp-label">Wrapped</span><span class="gp-val">${gt.symbol}</span></div>`
      + `<div class="gp-row"><span class="gp-label">Chain ID</span><span class="gp-val">${chainId} (0x${chainId.toString(16)})</span></div>`
      + `<div class="gp-contract">${contract}</div>`
      + `<div class="gp-actions">`
      + `<button class="gp-btn primary" onclick="navigator.clipboard.writeText('${contract}');this.textContent='Copied!';setTimeout(()=>this.textContent='Copy Address',1500)">Copy Address</button>`
      + (explorerLink ? `<button class="gp-btn" onclick="window.open('${explorerLink}','_blank')">View on Explorer</button>` : '')
      + `</div>`;

    document.getElementById('gasBackdrop').style.display = 'block';
    document.getElementById('gasPopup').style.display = 'block';
}

function closeGasPopup() {
    document.getElementById('gasBackdrop').style.display = 'none';
    document.getElementById('gasPopup').style.display = 'none';
}

// Infinite scroll via IntersectionObserver
var _scrollObserver = new IntersectionObserver(function(entries) {
    if (entries[0].isIntersecting && displayCount < filteredChains.length) {
        loadMoreChains();
    }
}, { rootMargin: '200px' });
_scrollObserver.observe(document.getElementById('scrollSentinel'));

// ── Detail Overlay ─────────────────────────────────────────────────
async function openDetailOverlay(chainId) {
    const overlay = document.getElementById('detailOverlay');
    const backdrop = document.getElementById('detailBackdrop');
    const body = document.getElementById('detailBody');

    // Find chain summary from loaded data
    const chain = allChains.find(c => c.chainId === chainId);
    const iconSrc = chain && chain.icon
        ? (chain.icon.startsWith('http') || chain.icon.startsWith('/') ? chain.icon : getApiUrl() + chain.icon)
        : '';

    // Set header
    document.getElementById('detailIcon').innerHTML = iconSrc
        ? `<img src="${iconSrc}" alt="${chain?.name || ''}" onerror="this.parentElement.innerHTML='<span class=\\'fallback\\'>?</span>'">`
        : `<span class="fallback">${(chain?.chain || chain?.name || '?')[0]}</span>`;
    document.getElementById('detailName').textContent = chain?.name || 'Chain ' + chainId;
    document.getElementById('detailChainId').textContent = `Chain ID: ${chainId} (0x${chainId.toString(16)})`;

    body.innerHTML = '<div class="status-msg loading" style="padding:20px">Loading details...</div>';

    // Reset position to center
    overlay.style.left = '50%';
    overlay.style.top = '80px';
    overlay.style.transform = 'translateX(-50%)';

    backdrop.classList.add('visible');
    overlay.classList.add('visible');

    // Try API first, fall back to local chain data
    let data = null;
    try {
        const controller = new AbortController();
        setTimeout(() => controller.abort(), 5000);
        const res = await fetch(`${getApiUrl()}/chains/${chainId}`, { signal: controller.signal });
        if (res.ok) data = await res.json();
    } catch (e) { /* API unavailable — use local data */ }

    // Fall back to local chain summary
    if (!data && chain) {
        data = {
            chainId: chain.chainId,
            name: chain.name,
            chain: chain.chain,
            nativeCurrency: chain.nativeCurrency,
            rpc: [],
            rpcCount: chain.rpcCount || 0,
            explorers: [],
            explorerCount: chain.explorerCount || 0,
            faucets: [],
            faucetCount: chain.faucetCount || 0,
            shortName: chain.shortName || '',
            infoURL: chain.infoUrl || '',
            networkId: chain.chainId,
            status: chain.status || '',
            market: chain.marketCap ? {
                marketCap: chain.marketCap,
                volume24h: chain.volume24h,
                price: chain.nativePrice,
                priceChange24h: chain.priceChange24h,
                protocolSymbol: chain.protocolSymbol,
                protocolPrice: chain.protocolPrice
            } : null,
            source: chain.source || 'api'
        };
    }

    if (!data) {
        body.innerHTML = '<div class="status-msg">Chain not found.</div>';
        return;
    }

    let html = '';

    // Market data row
    if (data.market || chain?.nativePrice) {
        const md = data.market || {};
        const hasProto = !!md.protocolSymbol;
        html += '<div class="detail-market-row">';

        if (hasProto && md.protocolPrice !== undefined) {
            html += `<div class="detail-market-item"><div class="val">$${formatPrice(md.protocolPrice)}</div><div class="lbl">${md.protocolSymbol} Price</div></div>`;
        }

        if (md.price || chain?.nativePrice) {
            const nPrice = md.price || chain?.nativePrice || 0;
            const lbl = hasProto ? (data.nativeCurrency?.symbol || '') + ' (Gas)' : (data.nativeCurrency?.symbol || '') + ' Price';
            html += `<div class="detail-market-item"><div class="val">$${formatPrice(nPrice)}</div><div class="lbl">${lbl}</div></div>`;
        }

        if (md.marketCap || chain?.marketCap) {
            const mcapLabel = hasProto ? md.protocolSymbol + ' MCap' : 'Market Cap';
            html += `<div class="detail-market-item"><div class="val">$${formatCompact(md.marketCap || chain?.marketCap || 0)}</div><div class="lbl">${mcapLabel}</div></div>`;
        }
        if (md.volume24h) {
            html += `<div class="detail-market-item"><div class="val">$${formatCompact(md.volume24h)}</div><div class="lbl">24h Volume</div></div>`;
        }
        if (md.priceChange24h || chain?.priceChange24h) {
            const pct = md.priceChange24h || chain?.priceChange24h || 0;
            const color = pct >= 0 ? '#00cc00' : '#ff4444';
            html += `<div class="detail-market-item"><div class="val" style="color:${color}">${pct >= 0 ? '+' : ''}${pct.toFixed(2)}%</div><div class="lbl">24h Change</div></div>`;
        }
        html += '</div>';
    }

    // Native currency
    if (data.nativeCurrency) {
        html += `<div class="detail-section"><h4>Native Currency</h4>`;
        html += `<div class="rpc-item">${data.nativeCurrency.name} (${data.nativeCurrency.symbol}) — ${data.nativeCurrency.decimals} decimals</div>`;
        html += `</div>`;
    }

    // DEX availability
    const dex = CHAIN_DEX_MAP[chainId];
    if (dex) {
        html += `<div class="detail-section"><h4>Decentralized Exchange</h4>`;
        html += `<div class="rpc-item"><a href="${dex.url}" target="_blank" rel="noopener" style="color:${dex.color};">Swap on ${dex.name}</a></div>`;
        // Show extra DEXes (e.g. Polygon has QuickSwap + Uniswap)
        if (dex.extra) {
            for (const ex of dex.extra) {
                html += `<div class="rpc-item"><a href="${ex.url}" target="_blank" rel="noopener">Swap on ${ex.name}</a></div>`;
            }
        }
        // If this is a Uniswap chain, also show explore link
        const UNISWAP_SLUGS = { 1:'ethereum',10:'optimism',56:'bnb',137:'polygon',324:'zksync',480:'worldchain',8453:'base',42161:'arbitrum',42220:'celo',43114:'avalanche',81457:'blast',7777777:'zora' };
        const uniSlug = UNISWAP_SLUGS[chainId];
        if (uniSlug) {
            if (dex.badge !== 'UNI') {
                html += `<div class="rpc-item"><a href="https://app.uniswap.org/swap?chain=${uniSlug}" target="_blank" rel="noopener">Swap on Uniswap</a></div>`;
            }
            html += `<div class="rpc-item"><a href="https://app.uniswap.org/explore/tokens/${uniSlug}" target="_blank" rel="noopener">Explore tokens on Uniswap</a></div>`;
        }
        html += `</div>`;
    }

    // CoinGecko asset platform info
    const geckoId = CHAIN_COINGECKO_MAP[chainId];
    if (geckoId) {
        html += `<div class="detail-section"><h4>Asset Platform</h4>`;
        html += `<div class="rpc-item">CoinGecko ID: <code>${geckoId}</code></div>`;
        const protoId = CHAIN_PROTOCOL_MAP[chainId];
        if (protoId) html += `<div class="rpc-item">Protocol Token: <code>${protoId}</code></div>`;
        html += `<div class="rpc-item"><a href="https://www.coingecko.com/en/coins/${protoId || geckoId}" target="_blank" rel="noopener">View on CoinGecko</a></div>`;
        html += `</div>`;
    }

    if (data.rpc && data.rpc.length > 0) {
        html += `<div class="detail-section"><h4>RPC Endpoints (${data.rpc.length})</h4>`;
        data.rpc.slice(0, 10).forEach(r => {
            html += `<div class="rpc-item">${r}</div>`;
        });
        if (data.rpc.length > 10) html += `<div class="rpc-item" style="color:var(--accent)">... and ${data.rpc.length - 10} more</div>`;
        html += `</div>`;
    } else if (data.rpcCount > 0) {
        html += `<div class="detail-section"><h4>RPC Endpoints</h4><div class="rpc-item">${data.rpcCount} available (connect API for details)</div></div>`;
    }

    if (data.explorers && data.explorers.length > 0) {
        html += `<div class="detail-section"><h4>Block Explorers</h4>`;
        data.explorers.forEach(e => {
            html += `<div class="explorer-item"><a href="${e.url}" target="_blank" rel="noopener">${e.name} — ${e.url}</a></div>`;
        });
        html += `</div>`;
    } else if (data.explorerCount > 0) {
        html += `<div class="detail-section"><h4>Block Explorers</h4><div class="rpc-item">${data.explorerCount} available</div></div>`;
    }

    if (data.faucets && data.faucets.length > 0) {
        html += `<div class="detail-section"><h4>Faucets</h4>`;
        data.faucets.forEach(f => {
            html += `<div class="faucet-item"><a href="${f}" target="_blank" rel="noopener">${f}</a></div>`;
        });
        html += `</div>`;
    }

    // Blockscout on-chain stats
    if (data.blockscout) {
        const bs = data.blockscout;
        html += `<div class="detail-section"><h4>Blockscout On-Chain Data</h4>`;
        if (bs.verifiedContracts) html += `<div class="rpc-item">Verified Contracts: <strong style="color:#00cc88">${Number(bs.verifiedContracts).toLocaleString()}</strong></div>`;
        if (bs.totalContracts) html += `<div class="rpc-item">Total Contracts: ${Number(bs.totalContracts).toLocaleString()}</div>`;
        if (bs.totalAddresses) html += `<div class="rpc-item">Total Addresses: ${Number(bs.totalAddresses).toLocaleString()}</div>`;
        if (bs.totalTransactions) html += `<div class="rpc-item">Total Transactions: ${Number(bs.totalTransactions).toLocaleString()}</div>`;
        if (bs.totalBlocks) html += `<div class="rpc-item">Total Blocks: ${Number(bs.totalBlocks).toLocaleString()}</div>`;
        if (bs.gasPrices && (bs.gasPrices.slow || bs.gasPrices.avg || bs.gasPrices.fast)) {
            html += `<div class="rpc-item">Gas: <span style="color:#00cc00">${bs.gasPrices.slow || '?'}</span> / <span style="color:#ffaa00">${bs.gasPrices.avg || '?'}</span> / <span style="color:#ff4444">${bs.gasPrices.fast || '?'}</span> Gwei</div>`;
        }
        if (bs.networkUtilization) html += `<div class="rpc-item">Network Utilization: ${bs.networkUtilization.toFixed(1)}%</div>`;
        if (bs.url) html += `<div class="rpc-item"><a href="${bs.url}" target="_blank" rel="noopener" style="color:#00cc88;">View on Blockscout</a></div>`;
        html += `</div>`;
    }

    // Verified contracts preview (from indexed data)
    if (data.contractCount > 0) {
        html += `<div class="detail-section"><h4>Verified Contracts (${data.contractCount} indexed)</h4>`;
        html += `<div id="detail-contracts-${chainId}" class="contracts-loading" style="color:rgba(255,255,255,0.4);font-style:italic;">Loading contracts...</div>`;
        html += `</div>`;
        // Async load contracts
        loadDetailContracts(chainId);
    }

    html += `<div class="detail-section"><h4>Info</h4>`;
    html += `<div class="rpc-item">Network ID: ${data.networkId ?? chainId}</div>`;
    if (data.shortName) html += `<div class="rpc-item">Short Name: ${data.shortName}</div>`;
    if (data.status) html += `<div class="rpc-item">Status: ${data.status}</div>`;
    if (data.source) html += `<div class="rpc-item">Source: ${data.source}</div>`;
    if (data.infoURL) html += `<div class="rpc-item"><a href="${data.infoURL}" target="_blank" rel="noopener">${data.infoURL}</a></div>`;
    html += `</div>`;

    // Action buttons
    html += `<div class="detail-actions">`;
    if (chainId === 0) {
        html += `<button class="chain-btn primary btc-info-btn" style="background:#f7931a;" data-action="btcinfo">&#8383; Bitcoin in MetaMask</button>`;
    } else {
        html += `<button class="chain-btn primary" onclick="addToMetaMask(${chainId})">Add to Wallet</button>`;
    }
    if (data.explorers && data.explorers[0]) {
        html += `<button class="chain-btn" onclick="window.open('${data.explorers[0].url}','_blank')">Open Explorer</button>`;
    }
    if (data.infoURL) {
        html += `<button class="chain-btn" onclick="window.open('${data.infoURL}','_blank')">Website</button>`;
    }
    if (dex) {
        html += `<button class="chain-btn" style="background:${dex.color};color:#fff;border:none;" onclick="window.open('${dex.url}','_blank')">Swap on ${dex.name}</button>`;
    }
    html += `</div>`;

    body.innerHTML = html || '<div class="status-msg">No additional details available.</div>';
}

    document.getElementById('detailBackdrop').classList.remove('visible');
}

// Load contracts list inside detail overlay
async function loadDetailContracts(chainId) {
    const el = document.getElementById('detail-contracts-' + chainId);
    if (!el) return;
    try {
        const ctrl = new AbortController();
        setTimeout(() => ctrl.abort(), 8000);
        const res = await fetch(`${getApiUrl()}/chains/${chainId}/contracts?limit=15`, { signal: ctrl.signal });
        if (!res.ok) { el.textContent = 'Failed to load contracts'; return; }
        const data = await res.json();
        if (!data.contracts || data.contracts.length === 0) {
            el.textContent = 'No contracts indexed yet';
            return;
        }
        const chain = allChains.find(c => c.chainId === chainId);
        const bsUrl = chain?.blockscoutUrl || data?.blockscoutUrl;
        let html = data.contracts.map(c => {
            const addr = c.address;
            const shortAddr = addr.slice(0, 8) + '...' + addr.slice(-6);
            const link = bsUrl ? `<a href="${bsUrl}/address/${addr}" target="_blank" rel="noopener" style="color:var(--muted);font-family:'Fira Code',monospace;font-size:0.7rem;">${shortAddr}</a>` : `<span style="font-family:'Fira Code',monospace;font-size:0.7rem;">${shortAddr}</span>`;
            return `<div class="rpc-item" style="display:flex;gap:8px;align-items:center;">
                <span style="color:#00cc88;min-width:140px;">${c.name || 'unnamed'}</span>
                ${link}
                ${c.language ? `<span style="font-size:0.6rem;color:var(--muted);opacity:0.6;">${c.language}</span>` : ''}
                ${c.proxy ? `<span style="font-size:0.6rem;color:var(--accent);">proxy</span>` : ''}
            </div>`;
        }).join('');
        if (data.verifiedOnChain && data.verifiedOnChain > data.contracts.length) {
            html += `<div style="margin-top:6px;font-size:0.7rem;color:var(--muted);">
                ${Number(data.verifiedOnChain).toLocaleString()} total verified on chain
                ${bsUrl ? `&middot; <a href="${bsUrl}/verified-contracts" target="_blank" rel="noopener" style="color:#00cc88;">View all on Blockscout</a>` : ''}
            </div>`;
        }
        el.innerHTML = html;
    } catch (e) {
        el.textContent = 'Failed to load contracts';
    }
}

// ── Draggable overlay ──────────────────────────────────────────────
(function initDrag() {
    const overlay = document.getElementById('detailOverlay');
    const handle = document.getElementById('detailDragHandle');
    let isDragging = false;
    let startX, startY, origLeft, origTop;

    function onStart(e) {
        // Don't drag if clicking close button
        if (e.target.closest('.detail-overlay-close')) return;
        isDragging = true;
        const touch = e.touches ? e.touches[0] : e;
        const rect = overlay.getBoundingClientRect();
        origLeft = rect.left;
        origTop = rect.top;
        startX = touch.clientX;
        startY = touch.clientY;
        // Switch from centered transform to absolute positioning
        overlay.style.transform = 'none';
        overlay.style.left = rect.left + 'px';
        overlay.style.top = rect.top + 'px';
        e.preventDefault();
    }

    function onMove(e) {
        if (!isDragging) return;
        const touch = e.touches ? e.touches[0] : e;
        const dx = touch.clientX - startX;
        const dy = touch.clientY - startY;
        overlay.style.left = (origLeft + dx) + 'px';
        overlay.style.top = (origTop + dy) + 'px';
    }

    function onEnd() {
        isDragging = false;
    }

    handle.addEventListener('mousedown', onStart);
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onEnd);
    handle.addEventListener('touchstart', onStart, { passive: false });
    document.addEventListener('touchmove', onMove, { passive: false });
    document.addEventListener('touchend', onEnd);
})();

function formatPrice(n) {
    if (!n && n !== 0) return '?';
    if (n >= 100) return n.toLocaleString(undefined, {maximumFractionDigits:2});
    if (n >= 1) return n.toFixed(2);
    if (n >= 0.01) return n.toFixed(4);
    return n.toFixed(6);
}

function formatCompact(n) {
    if (n >= 1e12) return (n / 1e12).toFixed(1) + 'T';
    if (n >= 1e9) return (n / 1e9).toFixed(1) + 'B';
    if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
    if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
    return n.toFixed(0);
}
