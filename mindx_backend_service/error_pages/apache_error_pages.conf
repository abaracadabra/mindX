# mindX Custom Error Pages — Apache Configuration
# Add these directives inside your <VirtualHost *:443> block for mindx.pythai.net
#
# Copy error pages to a location Apache can serve directly:
#   sudo cp /home/mindx/mindX/mindx_backend_service/error_pages/*.html /var/www/mindx-errors/
#   sudo chown www-data:www-data /var/www/mindx-errors/*.html
#
# Then add to your VirtualHost:

# Alias so Apache serves these directly (no proxy needed — works even when backend is down)
Alias /error-pages /var/www/mindx-errors

<Directory /var/www/mindx-errors>
    Require all granted
    Options -Indexes
</Directory>

# Backend unavailable (the main case: "mindX is thinking")
ErrorDocument 503 /error-pages/thinking.html
ErrorDocument 502 /error-pages/thinking.html
ErrorDocument 504 /error-pages/thinking.html

# Application errors
ErrorDocument 500 /error-pages/thinking.html

# Not found / forbidden
ErrorDocument 404 /error-pages/lost.html
ErrorDocument 403 /error-pages/lost.html

# Rate limiting
ErrorDocument 429 /error-pages/thinking.html

# Proxy error config — increase timeout so Apache waits longer before 503
ProxyTimeout 30
ProxyBadHeader Ignore
