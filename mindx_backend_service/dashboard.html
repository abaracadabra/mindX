*{box-sizing:border-box;margin:0;padding:0}

body{font-family:'Inter','SF Pro Text','Segoe UI',system-ui,-apple-system,sans-serif;background:#050810;color:#b0b8c4;font-size:13px}
canvas#bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.wrap{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column}

.hdr h1{font-size:15px;color:#e6edf3;letter-spacing:.5px}.hdr h1 b{color:#58a6ff}
.badge{font-size:10px;padding:2px 8px;border-radius:6px;background:rgba(13,51,33,.9);color:#3fb950;border:1px solid #238636;letter-spacing:.5px}
.badge.w{background:rgba(61,43,0,.9);color:#d29922;border-color:#9e6a03}
.sub{font-size:10px;color:#484f58;letter-spacing:.3px}
.main{flex:1;display:flex;overflow:hidden}
.left{flex:1;overflow-y:auto;scrollbar-width:none}
.left::-webkit-scrollbar{display:none}
.right{width:320px;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;border-left:1px solid rgba(26,31,46,.5)}
@media(max-width:960px){.main{flex-direction:column}.right{width:100%;height:40vh}}
.g{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(20,24,32,.2)}
@media(max-width:1300px){.g{grid-template-columns:repeat(3,1fr)}}
.c{background:rgba(10,14,20,.8);padding:5px 7px}
.ct{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:#4a5060;margin-bottom:3px;font-family:'SF Mono','Fira Code',monospace}
.mv{font-size:22px;font-weight:700;color:#e6edf3;line-height:1;font-family:'SF Mono','Fira Code',monospace}
.ms{font-size:10px;color:#5a6070;margin-top:2px}
.bc{height:2px;background:rgba(30,34,42,.5);border-radius:1px;margin-top:3px;overflow:hidden}
.b{height:100%;border-radius:1px;transition:width .5s}
.bg{background:#3fb950}.by{background:#d29922}.br{background:#f85149}
.w2{grid-column:span 2}.w4{grid-column:1/-1}
.r{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:11px;border-bottom:1px solid rgba(8,11,16,.4)}
.r:last-child{border:none}
.d{display:inline-block;width:4px;height:4px;border-radius:50%;margin-right:3px;vertical-align:middle}
.dg{background:#3fb950}.dr{background:#f85149}.dy{background:#d29922}.dx{background:#3d424d}
.ll{font-size:10px;color:#4a5060;padding:2px 0;word-break:break-all;line-height:1.4;border-bottom:1px solid rgba(5,8,16,.3);font-family:'SF Mono','Fira Code',monospace}
.ll:hover{color:#6e7681}
.tabs{display:flex;gap:1px;background:rgba(20,24,32,.4);flex-shrink:0}
.tab{flex:1;padding:4px;text-align:center;font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:#3d424d;background:rgba(10,14,20,.9);cursor:pointer;transition:color .15s}
.tab:hover{color:#6e7681}.tab.active{color:#58a6ff;border-bottom:1px solid #58a6ff}
.conv{flex:1;overflow-y:auto;padding:4px 8px;background:rgba(5,8,12,.5);scrollbar-width:none}
.conv::-webkit-scrollbar{display:none}
.msg{margin-bottom:6px;padding:6px 8px;border-radius:3px;font-size:12px;line-height:1.5}
.msg-usr{background:rgba(22,16,32,.5);border-left:2px solid #d2a8ff}
.msg-ai{background:rgba(10,32,18,.5);border-left:2px solid #3fb950}
.msg-hdr{font-size:9px;color:#3d424d;margin-bottom:2px;display:flex;justify-content:space-between}
.msg-txt{color:#a0a8b4;white-space:pre-wrap;word-break:break-word}
.rk{display:inline-block;padding:1px 4px;border-radius:2px;font-size:9px;font-weight:700;margin-right:3px}
.rk-s{background:rgba(20,50,20,.7);color:#3fb950}.rk-b{background:rgba(20,36,50,.7);color:#58a6ff}
.rk-v{background:rgba(36,36,20,.7);color:#d29922}.rk-p{background:rgba(20,20,36,.7);color:#6e7681}
.rk-u{background:rgba(20,20,20,.7);color:#3d424d}
.pulse{animation:p 2s ease-in-out infinite}@keyframes p{0%,100%{opacity:.3}50%{opacity:1}}
.toast{position:fixed;top:36px;right:12px;z-index:10;width:340px;pointer-events:none}
.toast-item{background:rgba(10,32,18,.92);border:1px solid rgba(63,185,80,.3);border-radius:5px;padding:8px 10px;margin-bottom:6px;backdrop-filter:blur(12px);animation:slideIn .5s ease-out,toastPulse 2s ease-in-out 1s 2,fadeOut .8s ease-in 12s forwards;pointer-events:auto;box-shadow:0 4px 24px rgba(63,185,80,.15),0 2px 12px rgba(0,0,0,.4)}
.toast-item .t-hdr{font-size:10px;color:#4a5060;display:flex;justify-content:space-between;margin-bottom:3px}
.toast-item .t-q{font-size:11px;color:#d2a8ff;margin-bottom:4px;line-height:1.4}
.toast-item .t-a{font-size:12px;color:#c5d0dc;line-height:1.5}
.toast-item .t-model{color:#3fb950;font-size:10px}
@keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes toastPulse{0%,100%{border-color:rgba(63,185,80,.3)}50%{border-color:rgba(63,185,80,.6);box-shadow:0 4px 28px rgba(63,185,80,.2),0 2px 12px rgba(0,0,0,.4)}}
@keyframes fadeOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateY(-8px) scale(.97)}}
@keyframes settleIn{0%{transform:translateX(40px) scale(1.03);opacity:0;background:rgba(63,185,80,.2);box-shadow:0 0 20px rgba(63,185,80,.25)}30%{opacity:1;background:rgba(63,185,80,.12);box-shadow:0 0 14px rgba(63,185,80,.15)}100%{transform:translateX(0) scale(1);background:inherit;box-shadow:none}}
.msg-new{animation:settleIn 1.4s ease-out}
.ft{padding:5px 8px;border-top:1px solid rgba(26,31,46,.5);font-size:10px;color:#3d424d;text-align:center;flex-shrink:0;background:rgba(10,14,20,.9)}
.ft a{color:#58a6ff;text-decoration:none}.ft a.dm{color:#3d424d}
.sp rect{fill:#3fb950;opacity:.7}

<body>
<canvas id="bg"></canvas>
<div class="toast" id="toast"></div>
<div class="wrap">
<div class="hdr">
<div style="display:flex;align-items:center;gap:8px"><h1>mind<b>X</b></h1><div class="sub" id="sub">...</div></div>
<div style="display:flex;align-items:center;gap:6px;font-size:11px"><a href="/docs.html" style="color:#58a6ff;text-decoration:none">docs</a><span style="color:#3d424d">/</span><a href="/book" style="color:#4a5060;text-decoration:none">book</a><span style="color:#3d424d">/</span><a href="/journal" style="color:#4a5060;text-decoration:none">journal</a><span style="color:#3d424d">/</span><a href="/redoc" style="color:#4a5060;text-decoration:none">api</a><span style="color:#3d424d">/</span><a href="/dojo/standings" style="color:#4a5060;text-decoration:none">dojo</a><span style="color:#3d424d">/</span><a href="/inference/status" style="color:#4a5060;text-decoration:none">inference</a><span style="color:#3d424d">/</span><a href="/automindx" style="color:#d2a8ff;text-decoration:none">origin</a><span style="color:#3d424d">&middot;</span><span class="badge" id="bge">...</span><span class="pulse" style="color:#3fb950;font-size:5px">&#9679;</span></div>
</div>
<div class="main">
<div class="left"><div class="g" id="grid"></div></div>
<div class="right">
<div class="tabs"><div class="tab active" onclick="T(0)" id="t0">dialogue</div><div class="tab" onclick="T(1)" id="t1">actions</div><div class="tab" onclick="T(2)" id="t2">agents</div><div class="tab" onclick="T(3)" id="t3">dojo</div></div>
<div class="conv" id="pnl"></div>
<div class="ft">mindx.pythai.net <span id="ts"></span> <a href="/docs.html">docs</a> <a href="/book" class="dm">book</a> <a href="/journal" class="dm">journal</a> <a href="/docs" class="dm">api</a></div>
</div>
</div>

<script>
const cv=document.getElementById('bg'),cx=cv.getContext('2d');
let W,H,nodes=[],particles=[],edges=[],LD=null,af=0;
const RM=window.matchMedia('(prefers-reduced-motion:reduce)').matches;
function rsz(){W=cv.width=innerWidth;H=cv.height=innerHeight}
addEventListener('resize',rsz);rsz();

function mkNodes(ag){
  nodes=[];const x0=W*.32,y0=H*.5;
  const grp={};ag.forEach((a,i)=>{const g=a.group||'op';(grp[g]=grp[g]||[]).push(a)});
  let ri=0;
  for(const[,mem]of Object.entries(grp)){
    const rad=70+ri*60;
    mem.forEach((a,i)=>{
      const ang=(i/Math.max(mem.length,1))*Math.PI*2+ri*.4;
      const t=a.verification_tier||1;
      nodes.push({x:x0+Math.cos(ang)*rad,y:y0+Math.sin(ang)*rad,r:2+t,id:a.entity_id,
        c:t>=3?'#3fb950':t>=2?'#58a6ff':t>=1?'#d29922':'#3d424d',
        vx:(Math.random()-.5)*.1,vy:(Math.random()-.5)*.1,ph:Math.random()*6.28,act:0});
    });ri++;
  }
}
function mkPart(){
  particles=[];const n=Math.min(90,Math.floor(W*H/12000));
  for(let i=0;i<n;i++)particles.push({x:Math.random()*W,y:Math.random()*H,s:Math.random()*1.2+.2,
    vx:(Math.random()-.5)*.2,vy:(Math.random()-.5)*.15,ph:Math.random()*6.28,
    cl:Math.random()>.7?'rgba(88,166,255,':'rgba(63,185,80,'});
}
mkPart();
function flashE(a,b){if(a>=0&&b>=0&&a<nodes.length&&b<nodes.length)edges.push({a,b,l:1})}

function drawBg(t){
  cx.fillStyle='rgba(5,8,16,.14)';cx.fillRect(0,0,W,H);
  const gr=cx.createRadialGradient(W*.32,H*.5,0,W*.32,H*.5,H*.55);
  gr.addColorStop(0,'rgba(88,166,255,.012)');gr.addColorStop(.5,'rgba(63,185,80,.006)');gr.addColorStop(1,'transparent');
  cx.fillStyle=gr;cx.fillRect(0,0,W,H);
  for(const p of particles){
    p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;
    cx.beginPath();cx.arc(p.x,p.y,p.s,0,6.28);cx.fillStyle=p.cl+(.1+Math.sin(t*.001+p.ph)*.08)+')';cx.fill();
  }
  if(!nodes.length)return;
  for(let i=edges.length-1;i>=0;i--){
    const e=edges[i];e.l-=.012;if(e.l<=0){edges.splice(i,1);continue}
    cx.beginPath();cx.moveTo(nodes[e.a].x,nodes[e.a].y);cx.lineTo(nodes[e.b].x,nodes[e.b].y);
    cx.globalAlpha=e.l*.3;cx.strokeStyle='#58a6ff';cx.lineWidth=e.l;cx.stroke();cx.globalAlpha=1;
  }
  for(const n of nodes){
    n.x+=n.vx+Math.sin(t*.0004+n.ph)*.15;n.y+=n.vy+Math.cos(t*.0006+n.ph)*.1;
    if(n.x<40||n.x>W*.6)n.vx*=-1;if(n.y<40||n.y>H-40)n.vy*=-1;
    const pr=n.r+Math.sin(t*.002+n.ph)*.5+(n.act>.5?1.5:0);
    cx.beginPath();cx.arc(n.x,n.y,pr*2.5,0,6.28);cx.fillStyle=n.c+'10';cx.fill();
    cx.beginPath();cx.arc(n.x,n.y,pr,0,6.28);cx.fillStyle=n.c;cx.globalAlpha=.6+n.act*.4;cx.fill();cx.globalAlpha=1;
    n.act*=.97;
  }
}
function anim(t){if(!RM||af%3===0)drawBg(t);af++;requestAnimationFrame(anim)}
requestAnimationFrame(anim);

const API='/diagnostics/live';let cpuH=[],curT=0;
let seenTs=new Set(); // track seen interaction timestamps
let pendingNew=[]; // new interactions waiting to settle into panel
function T(n){curT=n;document.querySelectorAll('.tab').forEach((t,i)=>t.className='tab'+(i===n?' active':''));if(LD)rpnl(LD)}
function spk(a){if(!a.length)return'';const mx=Math.max(...a,1);let r='';a.forEach((v,i)=>{const h=Math.max(1,Math.round(v/mx*8));r+=`<rect x="${i*2}" y="${8-h}" width="1" height="${h}"/>`});return `<svg class="sp" width="${a.length*2}" height="8">${r}</svg>`}
function bar(p){return `<div class="bc"><div class="b ${p>85?'br':p>65?'by':'bg'}" style="width:${p}%"></div></div>`}
function sa(a){return a?a.slice(0,6)+'..'+a.slice(-4):'?'}
function rk(t){const m={4:['SOV','rk-s'],3:['BF','rk-b'],2:['VER','rk-v'],1:['PRV','rk-p'],0:['UN','rk-u']};const[l,c]=m[t]||m[0];return `<span class="rk ${c}">${l}</span>`}

function showToast(m){
  const tc=document.getElementById('toast');
  const ts=m.timestamp||'';const td=ts.length>10?ts.slice(11,19):ts;
  const el=document.createElement('div');
  el.className='toast-item';
  el.innerHTML=`<div class="t-hdr"><span class="t-model">${m.model||'local'} ${m.latency_ms?m.latency_ms+'ms':''}</span><span>${td}</span></div><div class="t-q">${(m.prompt||'').replace(/</g,'&lt;').slice(0,120)}</div><div class="t-a">${(m.response||'').replace(/</g,'&lt;').slice(0,200)}</div>`;
  tc.prepend(el);
  // Auto-remove after animation completes (12s visible + 0.8s fade)
  setTimeout(()=>{if(el.parentNode)el.remove()},13000);
  // Keep max 3 toasts
  while(tc.children.length>3)tc.lastChild.remove();
}

function render(d){
  const s=d.system||{},inf=d.inference||{},v=d.vault||{};
  cpuH.push(s.cpu_percent||0);if(cpuH.length>50)cpuH.shift();
  const ld=s.load||[0,0,0];
  if(d.agents?.length&&(!nodes.length||nodes.length!==d.agents.length)){
    mkNodes(d.agents.map(a=>{const dj=(d.dojo||[]).find(x=>x.agent_id===a.entity_id);return{...a,group:dj?.group||'op'}}));
  }
  // Detect new interactions and show toast popups
  if(d.interactions?.length>0){
    const newOnes=[];
    d.interactions.forEach(m=>{
      const key=m.timestamp+'_'+m.prompt?.slice(0,20);
      if(!seenTs.has(key)){seenTs.add(key);newOnes.push(m)}
    });
    if(newOnes.length&&nodes.length>1){
      newOnes.forEach(m=>{
        showToast(m);
        pendingNew.push({m,shownAt:Date.now()});
        const i=Math.floor(Math.random()*nodes.length);
        nodes[i].act=1;flashE(i,(i+3)%nodes.length);
      });
    }
    // Settle pending into panel after 13s (matches toast duration)
    const now=Date.now();
    pendingNew=pendingNew.filter(p=>{
      if(now-p.shownAt>13000){return false}
      return true;
    });
  }

  let h='';
  // row 1: vitals
  h+=`<div class="c"><div class="ct">cpu ${spk(cpuH)}</div><div class="mv">${s.cpu_percent||0}%</div><div class="ms">avg ${s.cpu_avg||0}% ${ld[0]} ${ld[1]} ${ld[2]}</div>${bar(Math.max(s.cpu_percent||0,s.cpu_avg||0))}</div>`;
  h+=`<div class="c"><div class="ct">mem</div><div class="mv">${s.memory_used_gb||0}<small style="font-size:9px;color:#3d424d">/${s.memory_total_gb||0}G</small></div>${bar(s.memory_percent||0)}</div>`;
  h+=`<div class="c"><div class="ct">disk</div><div class="mv">${s.disk_used_gb||0}<small style="font-size:9px;color:#3d424d">/${s.disk_total_gb||0}G</small></div>${bar(s.disk_percent||0)}</div>`;
  h+=`<div class="c"><div class="ct">up</div><div class="mv">${d.uptime||'?'}</div><div class="ms">pid ${d.pid||'?'} ${d.process_memory_mb||'?'}MB</div></div>`;
  // row 2: counters
  h+=`<div class="c"><div class="ct">beliefs</div><div class="mv">${d.beliefs?.count||0}</div></div>`;
  h+=`<div class="c"><div class="ct">vault</div><div class="mv">${v.entries||0}</div><div class="ms">${v.cipher||''}</div></div>`;
  h+=`<div class="c"><div class="ct">dialogues</div><div class="mv">${(d.interactions||[]).length}</div></div>`;
  h+=`<div class="c"><div class="ct">stm total</div><div class="mv">${d.memory?.stm_records||0}</div><div class="ms">${d.memory?.agent_workspaces||0} wksp</div></div>`;
  // stm breakdown
  const sa2=d.memory?.stm_by_agent||{};const sk=Object.keys(sa2);
  if(sk.length){let st='';sk.forEach(k=>st+=`<div class="r"><span>${k}</span><span style="color:#4a5060">${sa2[k]}</span></div>`);
  h+=`<div class="c w2"><div class="ct">stm by agent</div>${st}</div>`}
  // inference
  let sr='';for(const[n,i]of Object.entries(inf.sources||{})){sr+=`<div class="r"><span><span class="d ${i.status==='available'?'dg':i.status==='unknown'?'dx':'dr'}"></span>${n}</span><span style="color:#3d424d">${(i.models||[]).join(',')|| i.type}</span></div>`}
  h+=`<div class="c w2"><div class="ct">inference ${inf.available||0}/${inf.total||0}</div>${sr}</div>`;
  // agents
  let ag='';for(const a of(d.agents||[]))ag+=`<div class="r"><span>${rk(a.verification_tier??1)} ${a.entity_id}</span><span style="color:#58a6ff;font-size:8px">${sa(a.address)}</span></div>`;
  h+=`<div class="c w2"><div class="ct">agents ${(d.agents||[]).length}</div>${ag}</div>`;
  // godel + beliefs side by side
  let gl='';(d.godel_choices||[]).forEach(g=>gl+=`<div class="r"><span style="color:#58a6ff">${g.agent}</span><span style="color:#3d424d">${g.type}</span></div>`);
  h+=`<div class="c"><div class="ct">g&ouml;del</div>${gl||'<span style="color:#3d424d">-</span>'}</div>`;
  let bl='';(d.beliefs?.sample||[]).slice(0,4).forEach(b=>bl+=`<div class="r"><span style="color:#7ee787;font-size:8px">${b.key.replace('identity.map.','')}</span></div>`);
  h+=`<div class="c"><div class="ct">beliefs</div>${bl||'<span style="color:#3d424d">-</span>'}</div>`;
  // model performance
  const mp=d.model_perf||[];
  if(mp.length){
    let mh='';mp.slice(-8).forEach(m=>mh+=`<div class="r"><span>${m.ts} ${m.model}</span><span style="color:#4a5060">${m.latency_ms}ms ${m.tps}t/s cpu:${m.cpu_at_query}%</span></div>`);
    h+=`<div class="c w2"><div class="ct">model performance (${mp.length} queries)</div>${mh}</div>`;
  }
  // disk + database + RAGE embed
  const dd=d.disk_detail||{};const db=d.database||{};const re=d.rage_embed||{};
  let dh='';
  Object.keys(dd).forEach(k=>dh+=`<div class="r"><span>${k}</span><span style="color:#4a5060">${dd[k]}</span></div>`);
  if(db.status==='connected'){dh+=`<div class="r"><span>pgvector</span><span style="color:#3fb950">${db.db_size} (${db.memories} mem, ${db.beliefs} bel)</span></div>`}
  else if(db.status){dh+=`<div class="r"><span>pgvector</span><span style="color:#f85149">${db.status}</span></div>`}
  if(re.docs||re.memories){dh+=`<div class="r"><span>RAGE embed</span><span style="color:#d2a8ff">${re.docs} doc chunks, ${re.memories} mem vectors</span></div>`}
  const vl=d.vllm||{};
  if(vl.installed!==undefined){const vc=vl.serving?'#3fb950':vl.installed?'#d29922':'#f85149';dh+=`<div class="r"><span>vLLM</span><span style="color:${vc}">${vl.version||'?'} ${vl.backend||''} ${vl.serving?'serving '+vl.model:''}</span></div>`}
  const gv=d.governor||{};
  if(gv.mode){const gc=gv.mode==='greedy'?'#f85149':gv.mode==='generous'?'#3fb950':gv.mode==='minimal'?'#484f58':'#58a6ff';dh+=`<div class="r"><span>governor</span><span style="color:${gc}">${gv.mode} ${gv.auto_adjust?'(auto)':'(manual)'}</span></div>`}
  if(dh)h+=`<div class="c"><div class="ct">storage</div>${dh}</div>`;
  // autonomous activity diagnostics
  const au=d.autonomous||{};const auth=d.author||{};
  let ah='';
  ah+=`<div class="r"><span><span class="d ${au.loop_running?'dg':'dr'}"></span>improvement loop</span><span style="color:#4a5060">${au.loop_running?'active':'stopped'}${au.last_cycle?' &middot; '+au.last_cycle:''}</span></div>`;
  ah+=`<div class="r"><span><span class="d ${auth.periodic_active?'dg':'dx'}"></span>author agent</span><span style="color:#4a5060">${auth.last_chapter||'no chapters yet'}${auth.lunar_day?' &middot; day '+auth.lunar_day:''}</span></div>`;
  ah+=`<div class="r"><span><span class="d ${au.restart_pending?'dy':'dx'}"></span>restart signal</span><span style="color:#4a5060">${au.restart_pending?'PENDING':'none'}</span></div>`;
  if(au.stuck_cycles>0)ah+=`<div class="r"><span style="color:#f85149">stuck cycles</span><span style="color:#f85149">${au.stuck_cycles}</span></div>`;
  if(au.circuit_breaker_open)ah+=`<div class="r"><span style="color:#f85149">circuit breaker</span><span style="color:#f85149">OPEN</span></div>`;
  h+=`<div class="c w2"><div class="ct">autonomous</div>${ah}</div>`;
  // logs full width
  let ll='';(d.recent_logs||[]).slice(0,10).forEach(l=>ll+=`<div class="ll">${l.replace(/</g,'&lt;')}</div>`);
  h+=`<div class="c w4"><div class="ct">log</div>${ll}</div>`;

  document.getElementById('grid').innerHTML=h;
  document.getElementById('sub').textContent=`${d.uptime} | ${(d.agents||[]).length} agents | ${inf.available||0} inference | ${(d.interactions||[]).length} dialogues`;
  document.getElementById('bge').textContent=s.cpu_percent!==undefined?'LIVE':'OFF';
  document.getElementById('bge').className='badge'+(s.cpu_percent!==undefined?'':' w');
  document.getElementById('ts').textContent=(d.timestamp||'').slice(11,19);
  rpnl(d);
}
function rpnl(d){
  const p=document.getElementById('pnl');
  if(curT===0){
    const ms=d.interactions||[];
    if(!ms.length){p.innerHTML='<div class="msg msg-ai"><div class="msg-txt" style="color:#3d424d">waiting...</div></div>';return}
    const recentKeys=new Set(pendingNew.map(pn=>pn.m.timestamp+'_'+(pn.m.prompt||'').slice(0,20)));
    let h='';ms.forEach(m=>{
      const ts=m.timestamp||'',td=ts.length>10?ts.slice(5,10)+' '+ts.slice(11,19):ts;
      const key=ts+'_'+(m.prompt||'').slice(0,20);
      const isNew=recentKeys.has(key);
      const cls=isNew?' msg-new':'';
      h+=`<div class="msg msg-usr${cls}"><div class="msg-hdr"><span style="color:#d2a8ff">${m.agent||'mindX'}</span><span>${td}</span></div><div class="msg-txt">${(m.prompt||'').replace(/</g,'&lt;').slice(0,180)}</div></div>`;
      h+=`<div class="msg msg-ai${cls}"><div class="msg-hdr"><span style="color:#3fb950">${m.model||'?'}</span><span>${m.latency_ms?m.latency_ms+'ms':''}</span></div><div class="msg-txt">${(m.response||'').replace(/</g,'&lt;').slice(0,280)}</div></div>`;
    });p.innerHTML=h;
    // Auto-scroll to bottom for newest
    p.scrollTop=p.scrollHeight;
  } else if(curT===1){
    // Actions
    const acts=d.actions||[];
    if(!acts.length){p.innerHTML='<div style="padding:8px;color:#3d424d">No actions yet. Autonomous loop will generate actions from backlog and model intelligence.</div>';return}
    let h='';acts.forEach(a=>{
      const sc=a.status==='completed'?'#3fb950':a.status==='failed'?'#f85149':'#d29922';
      const ts=(a.created_at||'').slice(11,19);
      h+=`<div style="padding:5px 0;border-bottom:1px solid rgba(8,11,16,.4)"><div class="r"><span style="color:${sc};font-weight:600;font-size:8px">${a.status.toUpperCase()}</span><span style="color:#3d424d;font-size:8px">${a.source||''} ${ts}</span></div><div style="font-size:10px;color:#b0b8c4;margin:2px 0;line-height:1.4">${a.description}</div><div style="font-size:8px;color:#4a5060">${a.agent_id} &middot; ${a.action_type}${a.result?' &middot; '+a.result:''}</div></div>`;
    });p.innerHTML=h;
  } else if(curT===2){
    // Agent interactions
    const ai=d.agent_interactions||[];
    const st=d.dojo||[];
    let h='';
    if(ai.length){
      h+='<div style="font-size:8px;color:#4a5060;padding:4px 0;border-bottom:1px solid rgba(8,11,16,.4)">RECENT INTERACTIONS</div>';
      ai.slice(0,12).forEach(i=>{
        h+=`<div style="padding:3px 0;border-bottom:1px solid rgba(8,11,16,.3)"><div class="r"><span style="color:#58a6ff">${i.from}</span><span style="color:#3d424d">${i.ts}</span></div><div style="font-size:9px;color:#6e7681">→ ${i.to} <span style="color:#d2a8ff">${i.type}</span> ${i.topic?'['+i.topic+']':''}</div></div>`;
      });
    }
    if(st.length){
      h+='<div style="font-size:8px;color:#4a5060;padding:6px 0 4px;border-bottom:1px solid rgba(8,11,16,.4)">STANDINGS</div>';
      st.forEach(s=>{h+=`<div style="padding:2px 0;border-bottom:1px solid rgba(8,11,16,.3)"><div class="r"><span>${rk(s.tier)} ${s.agent_id}</span><span style="color:#4a5060">${s.rank} ${s.score}</span></div></div>`});
    }
    if(!h)h='<div style="padding:8px;color:#3d424d">no interactions yet</div>';
    p.innerHTML=h;
  } else {
    // Dojo full view
    const st=d.dojo||[];
    if(!st.length){p.innerHTML='<div style="padding:8px;color:#3d424d">no standings</div>';return}
    let h='';st.forEach(s=>{h+=`<div style="padding:2px 0;border-bottom:1px solid rgba(8,11,16,.4)"><div class="r"><span>${rk(s.tier)} ${s.agent_id}</span><span style="color:#4a5060">${s.rank} ${s.score}</span></div>${bar(Math.min(100,s.score/100))}</div>`});
    p.innerHTML=h;
  }
}
async function rf(){try{const r=await fetch(API);if(r.ok){LD=await r.json();render(LD)}}catch(e){document.getElementById('bge').textContent='OFF';document.getElementById('bge').className='badge w'}}
rf();setInterval(rf,6000);
</script>
