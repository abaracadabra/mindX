@keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes toastPulse{0%,100%{border-color:rgba(63,185,80,.3)}50%{border-color:rgba(63,185,80,.6);box-shadow:0 4px 28px rgba(63,185,80,.2),0 2px 12px rgba(0,0,0,.4)}}
@keyframes fadeOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateY(-8px) scale(.97)}}

.msg-new{animation:settleIn 1.4s ease-out}

<script>
const cv=document.getElementById('bg'),cx=cv.getContext('2d');
let W,H,nodes=[],particles=[],edges=[],LD=null,af=0;
const RM=window.matchMedia('(prefers-reduced-motion:reduce)').matches;
function rsz(){W=cv.width=innerWidth;H=cv.height=innerHeight}
addEventListener('resize',rsz);rsz();

function mkNodes(ag){
  nodes=[];const x0=W*.32,y0=H*.5;
  const grp={};ag.forEach((a,i)=>{const g=a.group||'op';(grp[g]=grp[g]||[]).push(a)});
  let ri=0;
  for(const[,mem]of Object.entries(grp)){
    const rad=70+ri*60;
    mem.forEach((a,i)=>{
      const ang=(i/Math.max(mem.length,1))*Math.PI*2+ri*.4;
      const t=a.verification_tier||1;
      nodes.push({x:x0+Math.cos(ang)*rad,y:y0+Math.sin(ang)*rad,r:2+t,id:a.entity_id,
        c:t>=3?'#3fb950':t>=2?'#58a6ff':t>=1?'#d29922':'#3d424d',
        vx:(Math.random()-.5)*.1,vy:(Math.random()-.5)*.1,ph:Math.random()*6.28,act:0});
    });ri++;
  }
}
function mkPart(){
  particles=[];const n=Math.min(90,Math.floor(W*H/12000));
  for(let i=0;i<n;i++)particles.push({x:Math.random()*W,y:Math.random()*H,s:Math.random()*1.2+.2,
    vx:(Math.random()-.5)*.2,vy:(Math.random()-.5)*.15,ph:Math.random()*6.28,
    cl:Math.random()>.7?'rgba(88,166,255,':'rgba(63,185,80,'});
}
mkPart();
function flashE(a,b){if(a>=0&&b>=0&&a<nodes.length&&b<nodes.length)edges.push({a,b,l:1})}

function drawBg(t){
  cx.fillStyle='rgba(5,8,16,.14)';cx.fillRect(0,0,W,H);
  const gr=cx.createRadialGradient(W*.32,H*.5,0,W*.32,H*.5,H*.55);
  gr.addColorStop(0,'rgba(88,166,255,.012)');gr.addColorStop(.5,'rgba(63,185,80,.006)');gr.addColorStop(1,'transparent');
  cx.fillStyle=gr;cx.fillRect(0,0,W,H);
  for(const p of particles){
    p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;
    cx.beginPath();cx.arc(p.x,p.y,p.s,0,6.28);cx.fillStyle=p.cl+(.1+Math.sin(t*.001+p.ph)*.08)+')';cx.fill();
  }
  if(!nodes.length)return;
  for(let i=edges.length-1;i>=0;i--){
    const e=edges[i];e.l-=.012;if(e.l<=0){edges.splice(i,1);continue}
    cx.beginPath();cx.moveTo(nodes[e.a].x,nodes[e.a].y);cx.lineTo(nodes[e.b].x,nodes[e.b].y);
    cx.globalAlpha=e.l*.3;cx.strokeStyle='#58a6ff';cx.lineWidth=e.l;cx.stroke();cx.globalAlpha=1;
  }
  for(const n of nodes){
    n.x+=n.vx+Math.sin(t*.0004+n.ph)*.15;n.y+=n.vy+Math.cos(t*.0006+n.ph)*.1;
    if(n.x<40||n.x>W*.6)n.vx*=-1;if(n.y<40||n.y>H-40)n.vy*=-1;
    const pr=n.r+Math.sin(t*.002+n.ph)*.5+(n.act>.5?1.5:0);
    cx.beginPath();cx.arc(n.x,n.y,pr*2.5,0,6.28);cx.fillStyle=n.c+'10';cx.fill();
    cx.beginPath();cx.arc(n.x,n.y,pr,0,6.28);cx.fillStyle=n.c;cx.globalAlpha=.6+n.act*.4;cx.fill();cx.globalAlpha=1;
    n.act*=.97;
  }
}
function anim(t){if(!RM||af%3===0)drawBg(t);af++;requestAnimationFrame(anim)}
requestAnimationFrame(anim);

const API='/diagnostics/live';let cpuH=[],curT=0;
let seenTs=new Set(); // track seen interaction timestamps
let pendingNew=[]; // new interactions waiting to settle into panel
function T(n){curT=n;document.querySelectorAll('.tab').forEach((t,i)=>t.className='tab'+(i===n?' active':''));if(LD)rpnl(LD)}
function spk(a){if(!a.length)return'';const mx=Math.max(...a,1);let r='';a.forEach((v,i)=>{const h=Math.max(1,Math.round(v/mx*8));r+=`<rect x="${i*2}" y="${8-h}" width="1" height="${h}"/>`});return `<svg class="sp" width="${a.length*2}" height="8">${r}</svg>`}
function bar(p){return `<div class="bc"><div class="b ${p>85?'br':p>65?'by':'bg'}" style="width:${p}%"></div></div>`}
function sa(a){return a?a.slice(0,6)+'..'+a.slice(-4):'?'}
function rk(t){const m={4:['SOV','rk-s'],3:['BF','rk-b'],2:['VER','rk-v'],1:['PRV','rk-p'],0:['UN','rk-u']};const[l,c]=m[t]||m[0];return `<span class="rk ${c}">${l}</span>`}

function showToast(m){
  const tc=document.getElementById('toast');
  const ts=m.timestamp||'';const td=ts.length>10?ts.slice(11,19):ts;
  const el=document.createElement('div');
  el.className='toast-item';
  el.innerHTML=`<div class="t-hdr"><span class="t-model">${m.model||'local'} ${m.latency_ms?m.latency_ms+'ms':''}</span><span>${td}</span></div><div class="t-q">${(m.prompt||'').replace(/</g,'&lt;').slice(0,120)}</div><div class="t-a">${(m.response||'').replace(/</g,'&lt;').slice(0,200)}</div>`;
  tc.prepend(el);
  // Auto-remove after animation completes (12s visible + 0.8s fade)
  setTimeout(()=>{if(el.parentNode)el.remove()},13000);
  // Keep max 3 toasts
  while(tc.children.length>3)tc.lastChild.remove();
}

function render(d){
  const s=d.system||{},inf=d.inference||{},v=d.vault||{};
  cpuH.push(s.cpu_percent||0);if(cpuH.length>50)cpuH.shift();
  const ld=s.load||[0,0,0];
  if(d.agents?.length&&(!nodes.length||nodes.length!==d.agents.length)){
    mkNodes(d.agents.map(a=>{const dj=(d.dojo||[]).find(x=>x.agent_id===a.entity_id);return{...a,group:dj?.group||'op'}}));
  }
  // Detect new interactions and show toast popups
  if(d.interactions?.length>0){
    const newOnes=[];
    d.interactions.forEach(m=>{
      const key=m.timestamp+'_'+m.prompt?.slice(0,20);
      if(!seenTs.has(key)){seenTs.add(key);newOnes.push(m)}
    });
    if(newOnes.length&&nodes.length>1){
      newOnes.forEach(m=>{
        showToast(m);
        pendingNew.push({m,shownAt:Date.now()});
        const i=Math.floor(Math.random()*nodes.length);
        nodes[i].act=1;flashE(i,(i+3)%nodes.length);
      });
    }
    // Settle pending into panel after 13s (matches toast duration)
    const now=Date.now();
    pendingNew=pendingNew.filter(p=>{
      if(now-p.shownAt>13000){return false}
      return true;
    });
  }

  let h='';
  // ── SYSTEM VITALS — expandable with load averages and process detail ──
  h+=`<div class="c" title="CPU utilization: current and 50-sample history"><div class="ct">cpu ${spk(cpuH)}</div><div class="mv">${s.cpu_percent||0}%</div>${bar(Math.max(s.cpu_percent||0,s.cpu_avg||0))}<details style="margin-top:4px"><summary style="cursor:pointer;color:#484f58;font-size:9px">load &amp; history</summary><div style="font-size:9px;color:#6e7681;padding:4px 0">avg: ${s.cpu_avg||0}%<br>load: ${ld[0]} ${ld[1]} ${ld[2]}<br>samples: ${cpuH.length}/50</div></details></div>`;
  h+=`<div class="c" title="RAM: ${s.memory_used_gb}GB used of ${s.memory_total_gb}GB total (${s.memory_percent}%)"><div class="ct">mem</div><div class="mv">${s.memory_used_gb||0}<small style="font-size:9px;color:#3d424d">/${s.memory_total_gb||0}G</small></div>${bar(s.memory_percent||0)}<details style="margin-top:4px"><summary style="cursor:pointer;color:#484f58;font-size:9px">process</summary><div style="font-size:9px;color:#6e7681;padding:4px 0">mindX process: ${d.process_memory_mb||'?'}MB<br>percent: ${s.memory_percent||0}%<br>free: ${((s.memory_total_gb||0)-(s.memory_used_gb||0)).toFixed(2)}GB</div></details></div>`;
  h+=`<div class="c" title="Disk: ${s.disk_used_gb}GB of ${s.disk_total_gb}GB"><div class="ct">disk</div><div class="mv">${s.disk_used_gb||0}<small style="font-size:9px;color:#3d424d">/${s.disk_total_gb||0}G</small></div>${bar(s.disk_percent||0)}<details style="margin-top:4px"><summary style="cursor:pointer;color:#484f58;font-size:9px">breakdown</summary><div style="font-size:9px;color:#6e7681;padding:4px 0">${Object.entries(d.disk_detail||{}).map(([k,v])=>`${k}: ${v}`).join('<br>')}</div></details></div>`;
  h+=`<div class="c" title="System uptime and process info"><div class="ct">up</div><div class="mv">${d.uptime||'?'}</div><div class="ms">pid ${d.pid||'?'}</div><details style="margin-top:4px"><summary style="cursor:pointer;color:#484f58;font-size:9px">detail</summary><div style="font-size:9px;color:#6e7681;padding:4px 0">process: ${d.process_memory_mb||'?'}MB<br>uptime: ${d.uptime_seconds||0}s<br>timestamp: ${d.timestamp||'?'}</div></details></div>`;

  // ── KNOWLEDGE COUNTERS — each expandable ──
  const bSample=d.beliefs?.sample||[];
  h+=`<div class="c" title="BDI belief system — ${d.beliefs?.count||0} beliefs in identity map"><div class="ct"><a href="/core/bdi-status" style="color:#58a6ff;text-decoration:none">beliefs</a></div><div class="mv">${d.beliefs?.count||0}</div><details style="margin-top:4px"><summary style="cursor:pointer;color:#484f58;font-size:9px">sample (${bSample.length})</summary>${bSample.map(b=>`<div style="font-size:8px;color:#7ee787;padding:2px 0;border-bottom:1px solid rgba(8,11,16,.3);word-break:break-all" title="${b.key}">${b.key.replace('identity.map.','')}</div>${typeof b.value==='object'?'<details style="margin-left:8px"><summary style="color:#484f58;font-size:8px;cursor:pointer">value</summary><pre style="font-size:7px;color:#6e7681;max-height:80px;overflow:auto;padding:4px;background:rgba(5,8,16,.4);border-radius:2px">${JSON.stringify(b.value,null,2).slice(0,400)}</pre></details>':''}`).join('')}</details></div>`;

  h+=`<div class="c" title="BANKON Vault — ${v.entries||0} encrypted entries"><div class="ct">vault</div><div class="mv">${v.entries||0}</div><details style="margin-top:4px"><summary style="cursor:pointer;color:#484f58;font-size:9px">security</summary><div style="font-size:9px;color:#6e7681;padding:4px 0">cipher: ${v.cipher||'?'}<br>kdf: ${v.kdf||'?'}<br>version: ${v.version||'?'}<br>locked: ${v.locked?'yes':'no'}</div></details></div>`;

  const EPS=[
    ['/diagnostics/live','dg','6s poll','Real-time system telemetry — CPU, memory, agents, inference, actions, beliefs'],
    ['/activity/stream','dg','SSE','Server-Sent Events real-time activity feed'],
    ['/activity/recent','dg','JSON','Recent activity events with room filtering'],
    ['/health','dg','200 OK','Simple health check'],
    ['/inference/status','dg',inf.available+'/'+inf.total+' src','Inference provider availability and scores'],
    ['/dojo/standings','dg',(d.dojo||[]).length+' agents','Agent reputation rankings with BONA FIDE verification'],
    ['/redoc','dg','API','Full API reference — '+(db.actions||0)+' actions tracked'],
  ];
  if(db.status==='connected')EPS.push(['/docs','dg',db.db_size||'?','pgvector: '+(db.memories||0).toLocaleString()+' memories, '+(db.mem_embeddings||0).toLocaleString()+' embeddings']);
  EPS.push(['/thesis/evidence','dg','JSON','Darwin-Godel thesis: empirical evidence for each claim with verdicts']);
  EPS.push(['/thesis/summary','dg','verdicts','Quick thesis verdicts: self-improvement, autonomy, resilience, Godel self-reference']);
  EPS.push(['/activity/stream','dg','SSE','Real-time activity feed via Server-Sent Events']);
  EPS.forEach(([path,st,label,tip])=>{
    ep+=`<div class="r" title="${tip}"><span><span class="d ${st}"></span><a href="${path}" style="color:#79c0ff;text-decoration:none;font-size:10px" title="${tip}">${path}</a></span><span style="color:#4a5060;font-size:9px">${label}</span></div>`;
  });
  h+=`<div class="c"><div class="ct"><a href="/docs" style="color:#58a6ff;text-decoration:none" title="Full API reference">endpoints</a></div>${ep}</div>`;

  // ── Memory activity with expandable agent breakdown ──
  const stmAgents=Object.entries(d.memory?.stm_by_agent||{}).sort((a,b)=>b[1]-a[1]);
  if(stmAgents.length){
    const totalStm=d.memory?.stm_records||1;
    let mah='';
    stmAgents.slice(0,5).forEach(([agent, count])=>{
      const pct=Math.round(count/totalStm*100);
      mah+=`<div class="r" title="${count.toLocaleString()} STM records (${pct}% of total)"><span style="color:#b0b8c4">${agent}</span><span style="color:#d2a8ff">${count.toLocaleString()} <small style="color:#4a5060">${pct}%</small></span></div>`;
      mah+=bar(pct);
    });
    if(stmAgents.length>5){
      mah+=`<details style="margin-top:4px"><summary style="cursor:pointer;color:#484f58;font-size:9px">${stmAgents.length-5} more agents</summary>`;
      stmAgents.slice(5).forEach(([agent, count])=>{
        mah+=`<div class="r"><span style="color:#8b949e">${agent}</span><span style="color:#4a5060">${count.toLocaleString()}</span></div>`;
      });
      mah+=`</details>`;
    }
    h+=`<div class="c" title="Short-term memory records by agent — ${totalStm.toLocaleString()} total"><div class="ct">memory: ${stmAgents.length} agents &middot; ${totalStm.toLocaleString()} records</div>${mah}</div>`;
  }

  // ── Dojo with expandable standings + group badges ──
  const djg=d.dojo||[];
  if(djg.length){
    const grps={};djg.forEach(s=>(grps[s.group]=grps[s.group]||[]).push(s));
    let dh2='';
    for(const[group,members]of Object.entries(grps)){
      dh2+=`<details open style="margin:2px 0"><summary style="cursor:pointer;color:#58a6ff;font-size:9px;text-transform:uppercase;letter-spacing:.5px" title="${members.length} agents in ${group}">${group} <span style="color:#4a5060">(${members.length})</span></summary>`;
      members.forEach(s=>{
        const sc=Math.min(100,s.score/100);
        dh2+=`<div class="r" title="Score: ${s.score} | Rank: ${s.rank} | Tier: ${s.tier} | BONA FIDE: ${s.bona_fide?'verified':'pending'}"><span>${rk(s.tier)} <a href="/dojo/agent/${s.agent_id}" style="color:#c9d1d9;text-decoration:none">${s.agent_id}</a></span><span style="color:#4a5060">${s.rank} <small>${s.score}</small></span></div>`;
        dh2+=bar(sc);
      });
      dh2+=`</details>`;
    }
    h+=`<div class="c w2" title="Agent reputation system — BONA FIDE on Algorand"><div class="ct"><a href="/dojo/standings" style="color:#58a6ff;text-decoration:none">dojo standings</a> (${djg.length})</div>${dh2}</div>`;
  }

  // ── Logs with expandable view ──
  const logs=d.recent_logs||[];
  let ll='';logs.slice(0,5).forEach(l=>ll+=`<div class="ll">${l.replace(/</g,'&lt;')}</div>`);
  if(logs.length>5){
    ll+=`<details style="margin-top:2px"><summary style="cursor:pointer;color:#484f58;font-size:9px">${logs.length-5} more log entries</summary>`;
    logs.slice(5).forEach(l=>ll+=`<div class="ll">${l.replace(/</g,'&lt;')}</div>`);
    ll+=`</details>`;
  }
  h+=`<div class="c w4" title="Runtime log — most recent entries"><div class="ct">log (${logs.length})</div>${ll}</div>`;

  document.getElementById('grid').innerHTML=h;
  document.getElementById('sub').textContent=`${d.uptime} | ${(d.agents||[]).length} agents | ${inf.available||0} inference | ${(d.interactions||[]).length} dialogues`;
  document.getElementById('bge').textContent=s.cpu_percent!==undefined?'LIVE':'OFF';
  document.getElementById('bge').className='badge'+(s.cpu_percent!==undefined?'':' w');
  document.getElementById('ts').textContent=(d.timestamp||'').slice(11,19);
  rpnl(d);
}
function rpnl(d){
  const p=document.getElementById('pnl');
  if(curT===0){
    const ms=d.interactions||[];
    if(!ms.length){p.innerHTML='<div class="msg msg-ai"><div class="msg-txt" style="color:#6e7681;font-size:12px">mindX is initializing. Dialogues will appear as agents communicate.</div></div>';return}
    const recentKeys=new Set(pendingNew.map(pn=>pn.m.timestamp+'_'+(pn.m.prompt||'').slice(0,20)));
    let h='';ms.forEach(m=>{
      const ts=m.timestamp||'',td=ts.length>10?ts.slice(5,19).replace('T',' '):ts;
      const key=ts+'_'+(m.prompt||'').slice(0,20);
      const isNew=recentKeys.has(key);
      const cls=isNew?' msg-new':'';
      h+=`<div class="msg msg-usr${cls}"><div class="msg-hdr"><span style="color:#d2a8ff;font-weight:600">${m.agent||'mindX'}</span><span>${td}</span></div><div class="msg-txt">${(m.prompt||'').replace(/</g,'&lt;').slice(0,300)}</div></div>`;
      h+=`<div class="msg msg-ai${cls}"><div class="msg-hdr"><span style="color:#3fb950;font-weight:600">${m.model||'?'}</span><span>${m.latency_ms?m.latency_ms+'ms':''}</span></div><div class="msg-txt">${(m.response||'').replace(/</g,'&lt;').slice(0,500)}</div></div>`;
    });p.innerHTML=h;
    // Auto-scroll to bottom for newest
    p.scrollTop=p.scrollHeight;
  } else if(curT===1){
    // Actions
    const acts=d.actions||[];
    if(!acts.length){p.innerHTML='<div style="padding:12px;color:#6e7681;font-size:12px">No actions yet. The autonomous loop will generate actions from the improvement backlog.</div>';return}
    let h='';acts.forEach(a=>{
      const sc=a.status==='completed'?'#3fb950':a.status==='failed'?'#f85149':'#d29922';
      const ts=(a.created_at||'').slice(5,19).replace('T',' ');
      h+=`<div style="padding:8px 6px;border-bottom:1px solid rgba(8,11,16,.4)"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px"><span style="color:${sc};font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.5px">${a.status}</span><span style="color:#6e7681;font-size:10px">${a.source||''} ${ts}</span></div><div style="font-size:12px;color:#c5d0dc;margin:4px 0;line-height:1.5">${(a.description||'').slice(0,200)}</div><div style="font-size:10px;color:#6e7681">${a.agent_id||'?'} &middot; <span style="color:#58a6ff">${a.action_type||'?'}</span>${a.result?' &middot; '+a.result:''}</div></div>`;
    });p.innerHTML=h;
  } else if(curT===2){
    // Agent interactions
    const ai=d.agent_interactions||[];
    const st=d.dojo||[];
    let h='';
    if(ai.length){
      h+='<div style="font-size:10px;color:#6e7681;padding:6px 0;border-bottom:1px solid rgba(8,11,16,.4);text-transform:uppercase;letter-spacing:.5px">RECENT INTERACTIONS</div>';
      ai.slice(0,12).forEach(i=>{
        h+=`<div style="padding:5px 0;border-bottom:1px solid rgba(8,11,16,.3)"><div class="r"><span style="color:#58a6ff;font-weight:600">${i.from}</span><span style="color:#6e7681;font-size:10px">${i.ts}</span></div><div style="font-size:11px;color:#8b949e;margin-top:2px">&rarr; ${i.to} <span style="color:#d2a8ff">${i.type}</span> ${i.topic?'['+i.topic+']':''}</div></div>`;
      });
    }
    if(st.length){
      h+='<div style="font-size:8px;color:#4a5060;padding:6px 0 4px;border-bottom:1px solid rgba(8,11,16,.4)">STANDINGS</div>';
      st.forEach(s=>{h+=`<div style="padding:2px 0;border-bottom:1px solid rgba(8,11,16,.3)"><div class="r"><span>${rk(s.tier)} ${s.agent_id}</span><span style="color:#4a5060">${s.rank} ${s.score}</span></div></div>`});
    }
    if(!h)h='<div style="padding:12px;color:#6e7681;font-size:12px">No agent interactions yet. The orchestration hierarchy will populate as agents communicate.</div>';
    p.innerHTML=h;
  } else if(curT===3){
    // Dojo full view with expandable groups
    const st=d.dojo||[];
    if(!st.length){p.innerHTML='<div style="padding:8px;color:#3d424d">no standings</div>';return}
    const grps={};st.forEach(s=>(grps[s.group]=grps[s.group]||[]).push(s));
    let h='';
    for(const[group,members]of Object.entries(grps)){
      h+=`<details open style="margin:4px 0"><summary style="cursor:pointer;color:#58a6ff;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding:4px 0;border-bottom:1px solid rgba(8,11,16,.4)">${group} <span style="color:#4a5060;font-weight:400">(${members.length})</span></summary>`;
      members.forEach(s=>{
        const sc=Math.min(100,s.score/100);
        h+=`<div style="padding:4px 0;border-bottom:1px solid rgba(8,11,16,.3)" title="Score: ${s.score} | Rank: ${s.rank} | Tier: ${s.tier} | Group: ${s.group}">`;
        h+=`<div class="r"><span>${rk(s.tier)} <span style="color:#c9d1d9;font-weight:600">${s.agent_id}</span></span><span style="color:#4a5060">${s.rank} <small>${s.score}</small> ${s.bona_fide?'<span style="color:#3fb950;font-size:8px">BF</span>':''}</span></div>`;
        h+=bar(sc);
        h+=`</div>`;
      });
      h+=`</details>`;
    }
    p.innerHTML=h;
  } else if(curT===4){
    // Activity Feed tab — rendered by SSE feed system
    if(!window._afFeedEvents||!window._afFeedEvents.length){
      p.innerHTML='<div style="padding:12px;color:#6e7681;font-size:12px">Connecting to activity stream...<br><small style="color:#484f58">Events from boardroom, dojo, inference, improvement, thinking will appear here in real-time via SSE.</small></div>';
    } else {
      window._afRenderToPanel&&window._afRenderToPanel(p);
    }
  }
}
async function rf(){try{const r=await fetch(API);if(r.ok){LD=await r.json();render(LD)}}catch(e){document.getElementById('bge').textContent='OFF';document.getElementById('bge').className='badge w'}}
rf();setInterval(rf,6000);

// Thesis evidence now comes from /diagnostics/live (no separate fetch needed)

// ── Activity Feed (SSE) — integrated into tab 4 + header badge ──
(function(){
  const TIER={0:'UN',1:'PRV',2:'VER',3:'BF',4:'SOV',5:'GM',6:'MST'};
  const TCOL={0:'#f85149',1:'#d29922',2:'#58a6ff',3:'#3fb950',4:'#d2a8ff',5:'#79c0ff',6:'#e6edf3'};
  const RICON={boardroom:'\u2696',dojo:'\u2694',inference:'\u26A1',improvement:'\u2699',thinking:'\U0001F9E0',godel:'\u221E',memory:'\U0001F4BE',system:'\u2699'};
  let feedEvents=[];
  const MAX_FEED=100;
  window._afFeedEvents=feedEvents;

  function ago(ts){const s=Math.floor(Date.now()/1000-ts);if(s<60)return s+'s';if(s<3600)return Math.floor(s/60)+'m';return Math.floor(s/3600)+'h'}

  function renderCard(e){
    const badge=`<span style="color:${TCOL[e.agent_tier]||TCOL[0]};font-weight:700;font-size:9px">[${TIER[e.agent_tier]||'UN'}]</span>`;
    let detailHtml='';
    if(e.detail){
      const d=e.detail;
      // Smart rendering based on room type
      if(e.room==='boardroom'&&d.votes){
        detailHtml=`<details style="margin-top:4px"><summary style="cursor:pointer;color:#58a6ff;font-size:9px" title="Expand vote breakdown">vote breakdown</summary><div style="padding:4px 0;font-size:9px">`;
        (d.votes||[]).forEach(v=>{
          const vc=v.vote==='approve'?'#3fb950':v.vote==='reject'?'#f85149':'#8b949e';
          detailHtml+=`<div class="r" title="${v.soldier}: ${v.vote} (confidence: ${v.confidence}, provider: ${v.provider}, latency: ${v.latency_ms}ms)"><span style="color:${vc}">${v.vote==='approve'?'\u2713':v.vote==='reject'?'\u2717':'\u2014'} ${v.soldier}</span><span style="color:#484f58">${v.provider||'?'} ${v.latency_ms||''}ms</span></div>`;
        });
        detailHtml+=`<div style="color:#484f58;margin-top:3px">score: ${d.weighted_score||'?'} | dissent: ${d.dissent_branches||0}</div></div></details>`;
      } else if(e.room==='godel'&&d.options_considered){
        detailHtml=`<details style="margin-top:4px"><summary style="cursor:pointer;color:#d29922;font-size:9px" title="Expand decision rationale">rationale &amp; options</summary><div style="padding:4px 0;font-size:9px">`;
        detailHtml+=`<div style="color:#8b949e;margin-bottom:3px">${d.rationale||''}</div>`;
        (d.options_considered||[]).forEach(o=>{
          const chosen=o===d.chosen_option;
          detailHtml+=`<div style="color:${chosen?'#3fb950':'#4a5060'};padding:1px 0">${chosen?'\u25B6':'\u00B7'} ${o}</div>`;
        });
        detailHtml+=`</div></details>`;
      } else if(e.room==='inference'&&d.model){
        detailHtml=`<details style="margin-top:4px"><summary style="cursor:pointer;color:#d2a8ff;font-size:9px" title="Expand inference detail">model &amp; metrics</summary><div style="padding:4px 0;font-size:9px;color:#8b949e">`;
        if(d.latency_ms)detailHtml+=`latency: ${d.latency_ms}ms | `;
        if(d.model)detailHtml+=`model: ${d.model} | `;
        detailHtml+=`<br><div style="max-height:80px;overflow:auto;margin-top:4px;color:#6e7681;white-space:pre-wrap;font-size:8px">${(d.response||d.answer||'').slice(0,300)}</div>`;
        detailHtml+=`</div></details>`;
      } else {
        detailHtml=`<details style="margin-top:4px"><summary style="cursor:pointer;color:#484f58;font-size:9px">detail</summary><pre style="font-size:8px;color:#6e7681;max-height:100px;overflow:auto;padding:4px;margin-top:4px;background:rgba(5,8,16,.4);border-radius:3px;white-space:pre-wrap">${JSON.stringify(d,null,2).slice(0,500)}</pre></details>`;
      }
    }
    return `<div style="padding:8px 6px;border-bottom:1px solid rgba(8,11,16,.4);transition:background .15s" title="${e.room}: ${e.type} by ${e.agent}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px">
        <span>${badge} <span style="color:#c9d1d9;font-size:10px;font-weight:600">${e.agent||'system'}</span></span>
        <span style="color:#484f58;font-size:8px">${ago(e.timestamp)} <span style="color:${TCOL[2]};opacity:.4">#${e.room}</span></span>
      </div>
      <div style="color:#b0b8c4;font-size:10px;line-height:1.5">${(e.content||'').replace(/</g,'&lt;').slice(0,300)}</div>
      ${detailHtml}
    </div>`;
  }

  // Render feed into right panel when tab 4 is active
  window._afRenderToPanel=function(panel){
    if(!feedEvents.length){panel.innerHTML='<div style="padding:12px;color:#6e7681;font-size:12px">Activity stream loading...</div>';return}
    panel.innerHTML=feedEvents.slice(0,40).map(renderCard).join('');
  };

  // Update tab badge count
  function updateBadge(){
    const tab=document.getElementById('t4');
    if(tab)tab.textContent='feed ('+feedEvents.length+')';
    // If feed tab is active, re-render
    if(curT===4){
      const p=document.getElementById('pnl');
      if(p)window._afRenderToPanel(p);
    }
  }

  // SSE connection
  function connectSSE(){
    const es=new EventSource('/activity/stream');
    es.addEventListener('activity',function(e){
      try{
        const ev=JSON.parse(e.data);
        feedEvents.unshift(ev);
        if(feedEvents.length>MAX_FEED)feedEvents.length=MAX_FEED;
        window._afFeedEvents=feedEvents;
        updateBadge();
      }catch(err){}
    });
    es.addEventListener('heartbeat',function(){updateBadge()});
    es.onerror=function(){
      setTimeout(()=>{es.close();connectSSE()},5000);
    };
  }
  connectSSE();
})();
</script>
