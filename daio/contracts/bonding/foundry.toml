[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
# via_ir required for MultiCurveMath (stack depth); first build may be slower
via_ir = true
ffi = true
fs_permissions = [{ access = "read-write", path = "./" }]

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "prb-math/=lib/prb-math/src/",
    "forge-std/=lib/forge-std/src/"
]

[profile.default.fuzz]
runs = 256
max_test_rejects = 65536

[profile.ci]
fuzz = { runs = 10000 }
invariant = { runs = 1000 }

[fmt]
bracket_spacing = true
int_types = "long"
line_length = 120
multiline_func_header = "all"
number_underscore = "preserve"
quote_style = "double"
single_line_statement_blocks = "preserve"
tab_width = 4
wrap_comments = true
