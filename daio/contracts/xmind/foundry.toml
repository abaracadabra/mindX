[profile.default]
src = "."
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.20"
optimizer = true
optimizer_runs = 200
ignore = ["lib/openzeppelin-contracts/test", "lib/openzeppelin-contracts/certora", "lib/openzeppelin-contracts/scripts", "lib/**/test", "lib/**/certora", "lib/**/scripts"]

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/"
]

[profile.default.fuzz]
runs = 256

[fmt]
line_length = 120
