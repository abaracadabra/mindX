# Production Deployment Configuration for Complete DAIO Ecosystem
# This file configures all aspects of production deployment across multiple chains

deployment:
  name: "DAIO Production Ecosystem v1.0"
  version: "1.0.0"
  environment: "production"

  # Multi-chain configuration
  multichain:
    enabled: true
    primary_chain: "ethereum"
    secondary_chains:
      - "polygon"
      - "arbitrum"
      - "base"

  # Feature flags
  features:
    enable_all_eip_standards: true
    enable_corporate_examples: true
    enable_monitoring: true
    enable_cross_chain: true
    enable_upgradeable_contracts: true

# Blockchain Networks Configuration
networks:
  ethereum:
    chain_id: 1
    name: "Ethereum Mainnet"
    rpc_url: "${ETHEREUM_RPC_URL}"
    explorer_url: "https://etherscan.io"
    gas_limit: 10000000
    gas_price: "auto"
    deployer_key: "${ETHEREUM_DEPLOYER_KEY}"
    verify_contracts: true
    api_key: "${ETHERSCAN_API_KEY}"

  polygon:
    chain_id: 137
    name: "Polygon"
    rpc_url: "${POLYGON_RPC_URL}"
    explorer_url: "https://polygonscan.com"
    gas_limit: 20000000
    gas_price: "auto"
    deployer_key: "${POLYGON_DEPLOYER_KEY}"
    verify_contracts: true
    api_key: "${POLYGONSCAN_API_KEY}"

  arbitrum:
    chain_id: 42161
    name: "Arbitrum One"
    rpc_url: "${ARBITRUM_RPC_URL}"
    explorer_url: "https://arbiscan.io"
    gas_limit: 50000000
    gas_price: "auto"
    deployer_key: "${ARBITRUM_DEPLOYER_KEY}"
    verify_contracts: true
    api_key: "${ARBISCAN_API_KEY}"

  base:
    chain_id: 8453
    name: "Base"
    rpc_url: "${BASE_RPC_URL}"
    explorer_url: "https://basescan.org"
    gas_limit: 20000000
    gas_price: "auto"
    deployer_key: "${BASE_DEPLOYER_KEY}"
    verify_contracts: true
    api_key: "${BASESCAN_API_KEY}"

# DAIO Core Configuration
daio_core:
  chairman_address: "${DAIO_CHAIRMAN_ADDRESS}"
  ceo_address: "${DAIO_CEO_ADDRESS}"

  # Seven Soldiers Configuration
  executives:
    ciso: "${DAIO_CISO_ADDRESS}"    # Chief Information Security Officer
    cro: "${DAIO_CRO_ADDRESS}"      # Chief Risk Officer
    cfo: "${DAIO_CFO_ADDRESS}"      # Chief Financial Officer
    cpo: "${DAIO_CPO_ADDRESS}"      # Chief Product Officer
    coo: "${DAIO_COO_ADDRESS}"      # Chief Operating Officer
    cto: "${DAIO_CTO_ADDRESS}"      # Chief Technology Officer
    clo: "${DAIO_CLO_ADDRESS}"      # Chief Legal Officer

  # Constitutional Parameters
  constitution:
    tithe_rate: 1500              # 15% (basis points)
    diversification_limit: 1500   # 15% max single allocation
    emergency_timeout: 604800     # 7 days
    voting_period: 259200         # 3 days
    execution_delay: 86400        # 1 day

# Treasury Configuration
treasury:
  multi_sig_threshold: 3          # 3 of 5 signers required
  signers:
    - "${DAIO_TREASURY_SIGNER_1}"
    - "${DAIO_TREASURY_SIGNER_2}"
    - "${DAIO_TREASURY_SIGNER_3}"
    - "${DAIO_TREASURY_SIGNER_4}"
    - "${DAIO_TREASURY_SIGNER_5}"

  # Initial funding
  initial_funding:
    eth_amount: "10"              # 10 ETH initial funding
    enable_auto_collection: true

# EIP Standards Configuration
eip_standards:
  # ERC4626 Tokenized Vaults
  erc4626:
    enabled: true
    vault_name: "DAIO Corporate Vault"
    vault_symbol: "DCV"
    initial_assets:
      - symbol: "USDC"
        amount: "100000"          # 100,000 USDC
      - symbol: "WETH"
        amount: "50"              # 50 WETH

  # ERC3156 Flash Loans
  erc3156:
    enabled: true
    max_flash_loan: "1000000"     # 1M USD max flash loan
    flash_fee: 30                 # 0.3% flash loan fee
    supported_tokens:
      - "USDC"
      - "WETH"
      - "WBTC"

  # ERC2535 Diamond Proxy
  erc2535:
    enabled: true
    facets:
      - "GovernanceFacet"
      - "TreasuryFacet"
      - "VotingFacet"
      - "EmergencyFacet"

  # ERC4337 Account Abstraction
  erc4337:
    enabled: true
    entry_point: "${ERC4337_ENTRY_POINT}"
    paymaster_funding: "5"        # 5 ETH for paymaster
    corporate_accounts:
      daily_limit: "10000"        # $10,000 daily limit
      session_duration: 86400     # 24 hours

  # Additional Standards
  erc1400:                        # Security Tokens
    enabled: true
  erc1363:                        # Payable Tokens
    enabled: true
  erc6551:                        # Token Bound Accounts
    enabled: true

# Corporate Examples Configuration
corporate_examples:
  # Technology Company Example
  tech_corp:
    enabled: true
    name: "TechCorp DAO"
    industry: "Technology"
    employees: 500
    stock_symbol: "TECH"
    features:
      - "employee_equity"
      - "gasless_transactions"
      - "automated_vesting"
      - "governance_voting"

  # Financial Services Example
  financial_services:
    enabled: true
    name: "FinanceDAO"
    industry: "Financial Services"
    employees: 1000
    compliance:
      - "SEC"
      - "SOX"
      - "GDPR"
    features:
      - "regulatory_reporting"
      - "audit_trails"
      - "risk_management"

  # Manufacturing Example
  manufacturing:
    enabled: false              # Optional for production
    name: "ManufacturingDAO"
    industry: "Manufacturing"

# Security Configuration
security:
  # Multi-signature requirements
  multisig:
    enabled: true
    treasury_threshold: 3         # 3 of 5 for treasury operations
    governance_threshold: 2       # 2 of 3 for governance changes
    emergency_threshold: 1        # 1 of 3 for emergency actions

  # Access control
  access_control:
    admin_roles:
      - "${DAIO_ADMIN_1}"
      - "${DAIO_ADMIN_2}"
    operator_roles:
      - "${DAIO_OPERATOR_1}"
      - "${DAIO_OPERATOR_2}"
    validator_roles:
      - "${DAIO_VALIDATOR_1}"
      - "${DAIO_VALIDATOR_2}"

  # Time delays
  timelock:
    normal_delay: 86400           # 1 day for normal operations
    critical_delay: 259200        # 3 days for critical changes
    emergency_delay: 7200         # 2 hours for emergencies

  # Circuit breakers
  circuit_breakers:
    treasury_limit: "1000000"     # $1M max single transaction
    daily_limit: "5000000"        # $5M max daily transactions
    failure_threshold: 3          # 3 failures trigger circuit breaker

# Monitoring Configuration
monitoring:
  enabled: true

  # Health checks
  health_checks:
    interval: 300                 # 5 minutes
    endpoints:
      - "/health/governance"
      - "/health/treasury"
      - "/health/contracts"

  # Alerting
  alerts:
    email_recipients:
      - "${ALERT_EMAIL_1}"
      - "${ALERT_EMAIL_2}"
    slack_webhook: "${ALERT_SLACK_WEBHOOK}"
    thresholds:
      error_rate: 5               # 5% error rate triggers alert
      response_time: 5000         # 5 second response time
      gas_price: 100              # 100 gwei gas price

  # Metrics
  metrics:
    enabled: true
    retention_days: 90
    dashboards:
      - "governance_activity"
      - "treasury_operations"
      - "contract_performance"

# Integration Configuration
integrations:
  # Oracle services
  oracles:
    chainlink:
      enabled: true
      price_feeds:
        - "ETH/USD"
        - "BTC/USD"
        - "MATIC/USD"

    # Custom oracles
    custom:
      enabled: true
      endpoints:
        - "${CUSTOM_ORACLE_1}"
        - "${CUSTOM_ORACLE_2}"

  # External APIs
  apis:
    coingecko:
      api_key: "${COINGECKO_API_KEY}"
    defipulse:
      api_key: "${DEFIPULSE_API_KEY}"

  # Analytics
  analytics:
    enabled: true
    providers:
      - "Dune Analytics"
      - "The Graph"

# Deployment Process Configuration
deployment_process:
  # Pre-deployment checks
  pre_checks:
    - "environment_validation"
    - "security_audit"
    - "gas_estimation"
    - "dependency_verification"

  # Deployment stages
  stages:
    1: "infrastructure"           # Core infrastructure
    2: "governance"              # Governance system
    3: "treasury"                # Treasury system
    4: "eip_standards"           # EIP standards
    5: "corporate_examples"      # Corporate examples
    6: "cross_chain"             # Cross-chain setup
    7: "monitoring"              # Monitoring setup
    8: "validation"              # Final validation

  # Post-deployment actions
  post_deployment:
    - "contract_verification"
    - "health_check_setup"
    - "monitoring_activation"
    - "documentation_generation"
    - "team_notification"

  # Rollback procedures
  rollback:
    enabled: true
    triggers:
      - "deployment_failure"
      - "validation_failure"
      - "security_incident"
    procedures:
      - "pause_contracts"
      - "emergency_withdrawal"
      - "notify_stakeholders"

# Environment Variables Template
environment_variables:
  required:
    # Blockchain RPCs
    - "ETHEREUM_RPC_URL"
    - "POLYGON_RPC_URL"
    - "ARBITRUM_RPC_URL"
    - "BASE_RPC_URL"

    # Deployer Keys
    - "ETHEREUM_DEPLOYER_KEY"
    - "POLYGON_DEPLOYER_KEY"
    - "ARBITRUM_DEPLOYER_KEY"
    - "BASE_DEPLOYER_KEY"

    # API Keys
    - "ETHERSCAN_API_KEY"
    - "POLYGONSCAN_API_KEY"
    - "ARBISCAN_API_KEY"
    - "BASESCAN_API_KEY"

    # DAIO Addresses
    - "DAIO_CHAIRMAN_ADDRESS"
    - "DAIO_CEO_ADDRESS"
    - "DAIO_CISO_ADDRESS"
    - "DAIO_CRO_ADDRESS"
    - "DAIO_CFO_ADDRESS"
    - "DAIO_CPO_ADDRESS"
    - "DAIO_COO_ADDRESS"
    - "DAIO_CTO_ADDRESS"
    - "DAIO_CLO_ADDRESS"

    # Treasury Signers
    - "DAIO_TREASURY_SIGNER_1"
    - "DAIO_TREASURY_SIGNER_2"
    - "DAIO_TREASURY_SIGNER_3"
    - "DAIO_TREASURY_SIGNER_4"
    - "DAIO_TREASURY_SIGNER_5"

    # Alert Configuration
    - "ALERT_EMAIL_1"
    - "ALERT_EMAIL_2"
    - "ALERT_SLACK_WEBHOOK"

  optional:
    - "CUSTOM_ORACLE_1"
    - "CUSTOM_ORACLE_2"
    - "COINGECKO_API_KEY"
    - "DEFIPULSE_API_KEY"