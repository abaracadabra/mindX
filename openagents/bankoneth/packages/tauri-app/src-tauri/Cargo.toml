[package]
name        = "bankoneth-tauri-app"
version     = "0.1.0"
edition     = "2021"
license     = "Apache-2.0"
description = "bankoneth reference dApp — Tauri 2 shell"

[lib]
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
serde      = { version = "1", features = ["derive"] }
serde_json = "1"
tauri      = { version = "2", features = [] }
