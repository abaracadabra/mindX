# Apache reverse-proxy fragment for boardroom-service.
# Drop into the existing mindx.pythai.net <VirtualHost *:443> block.
#
# Three transport tiers — each gets its proxy directive with the right
# tuning. WebSocket upgrade and SSE flush must be explicit; Apache's
# default mod_proxy buffers both and produces broken streams.

# ── WebSocket: /boardroom-svc/rooms/{id}/ws ───────────────────────────
# upgrade=websocket on ProxyPass lets mod_proxy_http rewrite the Upgrade
# header instead of stripping it. Required for native WS through Apache.
RewriteEngine On
RewriteCond %{HTTP:Upgrade}     =websocket [NC]
RewriteCond %{HTTP:Connection}  upgrade    [NC]
RewriteRule ^/boardroom-svc/(.*)$  ws://127.0.0.1:8771/$1  [P,L]

# ── SSE: /boardroom-svc/rooms/{id}/observe ────────────────────────────
# flushpackets=on disables buffering on the proxy worker; no-cache forces
# the client to read the stream instead of cached chunks.
<Location /boardroom-svc/>
    ProxyPass        http://127.0.0.1:8771/  flushpackets=on connectiontimeout=10 timeout=600
    ProxyPassReverse http://127.0.0.1:8771/

    Header always set Cache-Control "no-cache, no-store, must-revalidate"
    Header always set Pragma         "no-cache"

    # CORS — the public UI is on mindx.pythai.net; future external clients
    # (war-council, mastermind.pythai.net) need explicit allowlist.
    Header always set Access-Control-Allow-Origin "https://mindx.pythai.net"
    Header always set Access-Control-Allow-Methods "GET, POST, OPTIONS"
    Header always set Access-Control-Allow-Headers "Authorization, Content-Type"
    Header always set Access-Control-Allow-Credentials "true"
</Location>

# Disable mod_deflate on this path — SSE and WSS frames must not be gzipped.
SetEnvIfNoCase Request_URI ^/boardroom-svc/ no-gzip dont-vary
