name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  cabinet-pytest:
    name: Cabinet · Python (26 tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov fastapi[all] httpx eth-account web3 pyjwt cryptography pydantic

      - name: Run Cabinet test suite with coverage
        run: |
          python -m pytest \
            tests/bankon_vault/test_shadow_overlord.py \
            tests/bankon_vault/test_cabinet.py \
            -c /dev/null -v \
            --cov=mindx_backend_service.bankon_vault.shadow_overlord \
            --cov=mindx_backend_service.bankon_vault.cabinet \
            --cov=mindx_backend_service.bankon_vault.admin_routes \
            --cov=mindx_backend_service.bankon_vault.sign_routes \
            --cov-report=term --cov-report=xml --cov-fail-under=75
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cabinet-coverage
          path: coverage.xml
          retention-days: 30

  conclave-pytest:
    name: Conclave · Python (9 tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Conclave deps
        working-directory: openagents/conclave
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pynacl cbor2 pydantic httpx

      - name: Run Conclave protocol tests
        working-directory: openagents/conclave
        run: python -m pytest tests/ -c /dev/null -v

  forge-tests:
    name: Forge · Solidity (${{ matrix.label }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - {profile: inft,           cwd: daio/contracts,           label: 'iNFT-7857 (57 tests)'}
          - {profile: bankon,         cwd: daio/contracts,           label: 'BANKON v1 (29 tests)'}
          - {profile: thot,           cwd: daio/contracts,           label: 'THOT v1 (14 tests)'}
          - {profile: agentregistry,  cwd: daio/contracts,           label: 'AgentRegistry (20 tests)'}

    steps:
      - uses: actions/checkout@v4
        # No submodule fetch — some nested OZ sub-submodules have stale URLs.
        # We install lib deps fresh below via forge install.

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install forge libs fresh (forge-std + OpenZeppelin)
        working-directory: ${{ matrix.cwd }}
        run: |
          rm -rf lib
          mkdir -p lib
          forge install foundry-rs/forge-std --no-git
          forge install OpenZeppelin/openzeppelin-contracts --no-git
          forge install OpenZeppelin/openzeppelin-contracts-upgradeable --no-git

      - name: Run forge tests
        working-directory: ${{ matrix.cwd }}
        env:
          FOUNDRY_PROFILE: ${{ matrix.profile }}
        run: forge test -vv

  conclave-forge:
    name: Forge · Conclave Solidity (35 tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # No submodule fetch — some nested OZ sub-submodules have stale URLs.
        # We install lib deps fresh below via forge install.

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install forge-std for Conclave (no daio dependency in CI)
        working-directory: openagents/conclave/contracts
        run: |
          rm -rf lib && mkdir -p lib
          forge install foundry-rs/forge-std --no-git

      - name: Run Conclave forge tests
        working-directory: openagents/conclave/contracts
        run: forge test

  slither:
    name: Slither · Static analysis (6 contracts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Foundry (for solc)
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install Slither
        run: |
          python -m pip install --upgrade pip
          pip install slither-analyzer

      - name: Install daio forge libs (required by slither for imports to resolve)
        working-directory: daio/contracts
        run: |
          rm -rf lib && mkdir -p lib
          forge install foundry-rs/forge-std --no-git
          forge install OpenZeppelin/openzeppelin-contracts --no-git
          forge install OpenZeppelin/openzeppelin-contracts-upgradeable --no-git

      - name: Install Conclave forge libs
        working-directory: openagents/conclave/contracts
        run: |
          rm -rf lib && mkdir -p lib
          forge install foundry-rs/forge-std --no-git

      # Each contract is scanned individually with --fail-high so a NEW high-
      # severity finding fails the build. Reentrancy detectors are excluded
      # because (a) every privileged function in iNFT_7857 has the OZ
      # ReentrancyGuard nonReentrant modifier (a runtime mutex Slither does
      # not model) and (b) test_mintAgent_blocksReentrancyViaOnERC721Received
      # actively performs the attack and proves the guard works. The known-
      # benign findings are documented in tests/results/2026-05-02/SLITHER_REPORT.md.
      - name: Slither · iNFT_7857
        working-directory: daio/contracts
        run: |
          # Excluded detectors with rationale (each documented in SLITHER_REPORT.md):
          #   reentrancy-{eth,no-eth,benign} — nonReentrant on every privileged
          #     function + active-exploit regression test; Slither doesn't model
          #     OZ ReentrancyGuard
          #   arbitrary-send-eth — sweepEth has onlyRole(TREASURER_ROLE) and the
          #     treasury address is admin-set; not arbitrary
          #   incorrect-exp — known false positive in OZ Math.mulDiv (bitwise XOR
          #     used intentionally, not exponentiation)
          #   divide-before-multiply — OZ Math library, well-audited
          slither inft/iNFT_7857.sol \
            --solc-remaps "@openzeppelin/=lib/openzeppelin-contracts/" \
            --exclude-low --exclude-informational --exclude-optimization \
            --exclude-dependencies \
            --exclude reentrancy-eth,reentrancy-no-eth,reentrancy-benign,arbitrary-send-eth,incorrect-exp,divide-before-multiply \
            --fail-high

      - name: Slither · BankonSubnameRegistrar
        working-directory: daio/contracts
        run: |
          slither ens/v1/BankonSubnameRegistrar.sol \
            --solc-remaps "@openzeppelin/=lib/openzeppelin-contracts/" \
            --exclude-low --exclude-informational --exclude-optimization \
            --exclude-dependencies \
            --fail-high

      - name: Slither · THOT
        working-directory: daio/contracts
        run: |
          slither THOT/v1/THOT.sol \
            --solc-remaps "@openzeppelin/=lib/openzeppelin-contracts/" \
            --exclude-low --exclude-informational --exclude-optimization \
            --exclude-dependencies \
            --fail-high

      - name: Slither · AgentRegistry
        working-directory: daio/contracts
        run: |
          slither agentregistry/AgentRegistry.sol \
            --solc-remaps "@openzeppelin/=lib/openzeppelin-contracts/" \
            --exclude-low --exclude-informational --exclude-optimization \
            --exclude-dependencies \
            --fail-high

      - name: Slither · Conclave
        working-directory: openagents/conclave/contracts
        run: |
          slither src/Conclave.sol \
            --exclude-low --exclude-informational --exclude-optimization \
            --exclude-dependencies \
            --fail-high

      - name: Slither · ConclaveBond
        working-directory: openagents/conclave/contracts
        run: |
          slither src/ConclaveBond.sol \
            --exclude-low --exclude-informational --exclude-optimization \
            --exclude-dependencies \
            --fail-high
