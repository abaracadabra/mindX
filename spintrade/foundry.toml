[profile.default]
src = "src"
test = "test"
script = "script"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
fs_permissions = [{ access = "read-write", path = "./deployments" }]

[profile.coverage]
optimizer = false
via_ir = false

[fmt]
line_length = 110
tab_width = 4
bracket_spacing = false

[rpc_endpoints]
anvil = "http://127.0.0.1:8545"
