<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mindX Dapp – Prototype</title>
    <link rel="stylesheet" href="styled.css">
</head>
<body>
    <div id="app">
        <header class="dapp-header">
            <h1>mindX Dapp</h1>
            <div id="wallet-status">Not connected</div>
            <button id="btn-connect" type="button">Connect wallet</button>
        </header>
        <main class="dapp-main">
            <section id="content">
                <p>Prototype: edit <code>dapp.js</code> and <code>styled.css</code>. For production and financial services, migrate to <code>.ts</code> / <code>.tsx</code> (see README).</p>
            </section>
        </main>
        <footer class="dapp-footer">
            <span>API: <code id="api-base">—</code></span>
        </footer>
    </div>
    <script src="dapp.js"></script>
</body>
</html>
