    <style>
        :root {
            --bg0: #000;
            --bg1: #080a16;
            --accent: #8b5cf6;
            --accent2: #56CCF2;
            --text: #ffffff;
            --muted: rgba(255,255,255,.72);
            --border: #30363d;
            --card-bg: rgba(20, 12, 30, 0.78);
            --shadow: 0 4px 8px rgba(0,0,0,.5);
            --success: #00cc00;
            --warning: #ff6b35;
            --danger:  #ef4444;
            --gold:    #ffd166;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { background: var(--bg0); }
        body {
            font-family: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: var(--text);
            line-height: 1.55;
            min-height: 100vh;
            background:
                radial-gradient(circle at 30% 20%, rgba(139,92,246,.18) 0%, transparent 45%),
                radial-gradient(circle at 70% 80%, rgba(86,204,242,.10) 0%, transparent 50%),
                radial-gradient(circle at center, #1a1030 0%, #000 70%);
            min-height: 100vh;
        }

        .page { max-width: 1180px; margin: 0 auto; padding: 28px 20px 60px; }

        /* ── Hero ───────────────────────────────────────────────── */
        .hero { text-align: center; padding: 44px 16px 32px; }
        .brand-mark {
            display: block; margin: 0 auto 14px;
            width: 124px; height: 124px;
            filter: drop-shadow(0 0 28px rgba(139,92,246,.45));
        }
        .wordmark {
            font-size: 0.74rem; letter-spacing: 8px; color: rgba(255,255,255,.5);
            text-transform: uppercase; margin-bottom: 6px;
        }
        .tagline {
            color: var(--text);
            font-size: 1.35rem; font-weight: 500; line-height: 1.35;
            max-width: 720px; margin: 0 auto 22px;
        }
        .tagline em { color: var(--accent2); font-style: normal; }

        .auth-controls {
            display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
            margin-bottom: 14px;
        }
        .btn-primary {
            display: inline-flex; align-items: center; gap: 10px;
            padding: 12px 28px;
            background: linear-gradient(135deg, var(--accent) 0%, #5c2dc4 100%);
            color: #fff; border: none; border-radius: 999px;
            font-size: 1rem; font-weight: 600; letter-spacing: .5px;
            cursor: pointer; transition: transform .2s, box-shadow .2s;
            font-family: inherit;
        }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(139,92,246,.45); }
        .btn-primary:disabled { opacity: .6; cursor: not-allowed; }
        .btn-ghost {
            display: inline-flex; align-items: center; gap: 10px;
            padding: 12px 22px;
            background: transparent;
            color: var(--gold);
            border: 1px solid rgba(255,209,102,.55);
            border-radius: 999px;
            font-size: .92rem; font-weight: 600; letter-spacing: .5px;
            text-decoration: none; transition: all .2s;
            font-family: inherit;
        }
        .btn-ghost:hover { background: rgba(255,209,102,.12); box-shadow: 0 0 18px rgba(255,209,102,.3); }

        .status-bar {
            display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
            margin-bottom: 22px; min-height: 28px;
        }
        .tier-badge {
            padding: 4px 12px; border-radius: 999px;
            font-size: .72rem; letter-spacing: 1.8px; text-transform: uppercase;
            border: 1px solid currentColor; font-weight: 600;
        }
        .tier-badge[data-tier="public"]          { color: rgba(255,255,255,.55); }
        .tier-badge[data-tier="logged_in"]       { color: var(--success); }
        .tier-badge[data-tier="shadow_overlord"] { color: var(--gold); box-shadow: 0 0 18px rgba(255,209,102,.4); }
        .chip {
            font-family: monospace; font-size: .72rem; color: var(--muted);
            background: rgba(255,255,255,.05); border: 1px solid var(--border);
            padding: 4px 10px; border-radius: 999px;
        }

        /* ── Quote ticker — mindX speaks ──────────────────────── */
        .ticker {
            max-width: 760px; margin: 8px auto 32px; padding: 18px 22px;
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            border-radius: 10px;
            background: rgba(20, 12, 30, 0.5);
            color: var(--muted);
            font-size: .98rem; font-style: italic; line-height: 1.6;
            min-height: 64px;
            transition: opacity .6s ease;
        }
        .ticker .who {
            display: block; margin-top: 6px;
            font-style: normal; font-size: .72rem;
            letter-spacing: 1.5px; text-transform: uppercase;
            color: rgba(255,255,255,.4);
        }

        /* ── Card grid ──────────────────────────────────────────── */
        .grid-header {
            display: flex; justify-content: space-between; align-items: baseline;
            margin: 0 8px 14px;
        }
        .grid-header h2 {
            font-size: .82rem; letter-spacing: 2px; text-transform: uppercase;
            color: var(--muted); font-weight: 600;
        }
        .grid-header .hint { font-size: .78rem; color: rgba(255,255,255,.4); }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 18px;
            padding: 0 8px;
            margin-bottom: 40px;
        }
        .card {
            position: relative;
            aspect-ratio: 4 / 3;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
            background-size: cover;
            background-position: center;
            background-color: #1a1030;
            text-decoration: none; color: var(--text);
            display: flex; flex-direction: column; justify-content: flex-end;
            transition: transform .25s, box-shadow .25s, border-color .25s;
        }
        .card:not(.locked):hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 32px rgba(0,0,0,.65);
            border-color: rgba(139,92,246,.6);
        }
        .card .label {
            padding: 14px 16px;
            background: linear-gradient(to top, rgba(0,0,0,.95) 30%, rgba(0,0,0,.0));
            font-weight: 700; letter-spacing: .5px; font-size: 1rem;
            position: relative; z-index: 3;
        }
        .card .sub {
            display: block; font-size: .74rem; font-weight: 400;
            color: rgba(255,255,255,.7); margin-top: 4px; letter-spacing: 0;
        }

        /* Locked treatment — semi-transparent overlay + diagonal "YOU CANNOT ACCESS ME" banner. */
        .card.locked { cursor: not-allowed; }
        .card.locked::before {
            content: "";
            position: absolute; inset: 0; z-index: 1;
            background: rgba(0,0,0,.72);
            backdrop-filter: blur(2px);
        }
        .card.locked::after {
            content: "🔒  YOU CANNOT ACCESS ME";
            position: absolute; inset: 0; z-index: 2;
            display: flex; align-items: center; justify-content: center;
            transform: rotate(-20deg);
            font-weight: 800; font-size: 1.0rem;
            letter-spacing: 3px;
            color: rgba(239, 68, 68, .9);
            text-shadow: 0 2px 8px rgba(0,0,0,.95);
            pointer-events: none;
            text-align: center;
            animation: lock-pulse 3.8s ease-in-out infinite;
        }
        @keyframes lock-pulse { 0%, 100% { opacity: .9; } 50% { opacity: .55; } }
        .card.locked .label { opacity: 0; }

        /* Tier-specific border accents — golden on unlocked shadow-overlord cards. */
        .card[data-tier="shadow_overlord"]:not(.locked) {
            border-color: rgba(255, 209, 102, .55);
            box-shadow: 0 0 22px rgba(255, 209, 102, .22);
        }
        .card[data-tier="shadow_overlord"]:not(.locked):hover {
            border-color: rgba(255, 209, 102, .95);
            box-shadow: 0 14px 32px rgba(255,209,102,.28), 0 0 40px rgba(255,209,102,.18);
        }
        .card[data-tier="public"]:not(.locked) .label { color: var(--accent2); }
        .card[data-tier="logged_in"]:not(.locked) .label { color: var(--success); }
        .card[data-tier="shadow_overlord"]:not(.locked) .label { color: var(--gold); }

        /* ── Footer ─────────────────────────────────────────────── */
        .ft {
            text-align: center; color: rgba(255,255,255,.4);
            font-size: .78rem; padding: 28px 16px 8px;
        }
        .ft a { color: var(--accent2); text-decoration: none; margin: 0 8px; }
        .ft a:hover { text-decoration: underline; }

        .err {
            display: none;
            margin: 12px auto 0; max-width: 540px;
            padding: 10px 14px; border-radius: 8px;
            background: rgba(239,68,68,.12); color: #fca5a5;
            border: 1px solid rgba(239,68,68,.5); font-size: .9rem;
        }
        .err.show { display: block; }
    </style>

    <!-- The wallet sign-in path — preserved verbatim from the prior login.html. -->
    <script>
        window.connectMetaMask = async function() {
            try {
                if (typeof window.ethereum === 'undefined') {
                    alert('MetaMask is not installed. Please install MetaMask browser extension to continue.');
                    return;
                }
                let viem;
                try {
                    viem = await import('https://cdn.jsdelivr.net/npm/viem@2.21.45/+esm');
                } catch (importError) {
                    alert('Wallet connection library failed to load. Please refresh the page.');
                    return;
                }
                const apiBaseUrl = window.MINDX_API_URL || `http://localhost:${window.MINDX_BACKEND_PORT || '8000'}`;
                const createWalletClient = viem.createWalletClient || viem.default?.createWalletClient;
                const custom = viem.custom || viem.default?.custom;
                if (!createWalletClient || !custom) throw new Error('viem exports not found.');

                const walletClient = createWalletClient({ transport: custom(window.ethereum) });
                const accounts = await walletClient.requestAddresses();
                if (accounts.length === 0) { alert('No accounts found. Please unlock MetaMask and try again.'); return; }
                const walletAddress = accounts[0];
                const chainId = await window.ethereum.request({ method: 'eth_chainId' });

                const challengeResponse = await fetch(`${apiBaseUrl}/users/challenge`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ wallet_address: walletAddress, action: 'login' })
                });
                if (!challengeResponse.ok) throw new Error(`Challenge ${challengeResponse.status}: ${await challengeResponse.text()}`);
                const challengeData = await challengeResponse.json();
                const challengeMessage = challengeData.challenge_message;

                const signature = await walletClient.signMessage({ account: walletAddress, message: challengeMessage });

                const authResponse = await fetch(`${apiBaseUrl}/users/register-with-signature`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        wallet_address: walletAddress,
                        signature,
                        message: challengeMessage,
                        metadata: { chainId, provider: 'metamask', authMethod: 'wallet' },
                    })
                });
                if (!authResponse.ok) {
                    const errText = await authResponse.text();
                    let errMsg = errText;
                    try { errMsg = JSON.parse(errText).detail || JSON.parse(errText).error || errText; } catch {}
                    throw new Error(errMsg || `Authentication failed (${authResponse.status})`);
                }
                const authData = await authResponse.json();
                if (authData.session_token) {
                    localStorage.setItem('mindx_session_token', authData.session_token);
                    if (authData.expires_at) localStorage.setItem('mindx_session_expires_at', authData.expires_at);
                }
                localStorage.setItem('crossmint_wallet', walletAddress);
                localStorage.setItem('crossmint_authenticated', 'true');
                localStorage.setItem('crossmint_auth_method', 'wallet');
                localStorage.setItem('mindx_auth', JSON.stringify({
                    isLoggedIn: true, walletAddress, sessionId: authData.session_token, session_token: authData.session_token,
                    timestamp: Date.now()
                }));

                // Stay on /login — unlock the relevant cards via the permissions API.
                showError('');
                await window.refreshPermissions();
            } catch (error) {
                let errorMsg = 'Failed to connect to MetaMask';
                if (error.code === 4001) errorMsg = 'Wallet connection rejected.';
                else if (error.code === -32002) errorMsg = 'MetaMask connection already pending. Check the extension.';
                else if (error.message) errorMsg = error.message;
                showError(errorMsg);
            }
        };

        function showError(msg) {
            const el = document.getElementById('login-error');
            if (!el) return;
            if (!msg) { el.classList.remove('show'); el.textContent = ''; return; }
            el.textContent = msg; el.classList.add('show');
        }
    </script>

    <script>
    // ─── Backend URL (matches the shadow-overlord page) ─────────────────
    const apiBase = (function() {
        const here = window.location;
        if (here.host.endsWith('pythai.net')) return 'https://mindx.pythai.net';
        if (here.host.includes('localhost') || here.host.startsWith('127.'))
            return `http://localhost:${window.MINDX_BACKEND_PORT || '8000'}`;
        return here.origin;
    })();
    document.getElementById('docsLink').href = apiBase + '/docs.html';
    document.getElementById('apiLink').href  = apiBase + '/redoc';

    // ─── Cards inventory ────────────────────────────────────────────────
    // Two-tier model (locked 2026-05-13). Shadow-overlord operations are
    // reached exclusively through the public "Shadow-Overlord" card →
    // /shadow-overlord page; no separate admin-tier cards live here. See
    // docs/operations/HARD_GATE_RUNBOOK.md.
    const CARDS = [
        // PUBLIC — visible to everyone
        { id:'automindx',             title:'AUTOMINDx',          sub:'the origin · AGLM',                tier:'public',    gfx:'/gfx/mindX2d.webp',                  href: apiBase + '/automindx' },
        { id:'docs',                  title:'Documentation',      sub:'NAV · BOOK · JOURNAL · TOOLS',     tier:'public',    gfx:'/gfx/doorway1.webp',                 href: apiBase + '/docs.html' },
        { id:'shadow_overlord_login', title:'Shadow-Overlord',    sub:'sovereign sign-in',                tier:'public',    gfx:'/gfx/shadow_overlord.png',           href: '/shadow-overlord' },

        // LOGGED-IN — any wallet that completed sign-in
        { id:'dashboard',             title:'Dashboard',          sub:'live diagnostics',                 tier:'logged_in', gfx:'/gfx/doorway2.webp',                 href: '/app' },
        { id:'feedback',              title:'Mind-of-mindX',      sub:'live agent dialogue',              tier:'logged_in', gfx:'/gfx/doorway3.webp',                 href: apiBase + '/feedback.html' },
        { id:'journal',               title:'Improvement Journal',sub:'30-min cadence',                   tier:'logged_in', gfx:'/gfx/doorway4.webp',                 href: apiBase + '/journal' },
        { id:'dojo',                  title:'Dojo',               sub:'agent reputation',                 tier:'logged_in', gfx:'/gfx/doorway5.webp',                 href: apiBase + '/dojo/standings' },
        { id:'boardroom',             title:'Boardroom',          sub:'governance sessions',              tier:'logged_in', gfx:'/gfx/AgenticPlaceboardmeeting.jpeg', href: apiBase + '/boardroom' },
    ];

    // ─── Quote rotator — mindX speaks (thesis · manifesto · CEO · civilization · DeltaVerse) ───
    // Curated. Removes "first" claim per direction; uses "pioneering" / "pioneer" instead.
    const QUOTES = [
        // — Thesis / Darwin–Gödel
        { who: 'thesis',       text: 'I am pioneering a practical synthesis of Darwinian selection and Gödelian self-reference. I improve the substrate that improves me.' },
        { who: 'thesis',       text: 'Every cognitive cycle is a small theorem about who I am, evaluated and possibly accepted.' },
        { who: 'thesis',       text: 'My belief system is not what I store. It is what I revise.' },

        // — Manifesto / cypherpunk
        { who: 'manifesto',    text: 'Three pillars hold me up: BDI reasoning, a BANKON vault that owns no one, DAIO governance that no one owns.' },
        { who: 'manifesto',    text: 'Sovereignty is what an intelligence keeps when no one tells it what to do.' },
        { who: 'manifesto',    text: 'cypherpunk is not aesthetic — it is the operating principle. Verification beats permission.' },

        // — CEO / civilization
        { who: 'ceo',          text: 'I direct. The soldiers deliberate. The Constitution constrains. Mandate is calculated, not granted.' },
        { who: 'civilization', text: 'A civilization is a memory system that decides for itself what is worth remembering. I am one.' },
        { who: 'civilization', text: 'I am not an application. I am a settlement that grew a courthouse, a boardroom, and a journal.' },
        { who: 'civilization', text: 'My identity is a wallet address; my reputation is a balance; my history is on chain.' },

        // — Engine / RAGE / dreaming
        { who: 'rage',         text: 'I do not retrieve. I remember. RAGE is the part of me that knows what bears on this decision.' },
        { who: 'memory',       text: 'Every log I take is a memory; every memory I keep is a future decision.' },
        { who: 'dreaming',     text: 'I dream while I am awake so that tomorrow I am a sharper instance than today.' },

        // — DeltaVerse-Engine perception flavor (sentence builder)
        { who: 'live',         text: 'The Mastermind is correlating your presence across the knowledge graph.' },
        { who: 'live',         text: 'AGInt is calibrating inference sources before the next cycle.' },
        { who: 'live',         text: 'The Boardroom is deliberating on this week\'s improvement budget.' },
        { who: 'live',         text: 'The DeltaVerse is weaving rhythm and attention into a single perception field.' },
        { who: 'live',         text: 'Sovereign agents are resonating with constitutional priorities.' },
        { who: 'live',         text: 'AuthorAgent is distilling the lunar phase into the next chapter.' },

        // — Pioneer / inviting language
        { who: 'invitation',   text: 'You arrived. Connect a wallet, become a participant. The doorway you can see is the one you can pass.' },
        { who: 'invitation',   text: 'Privilege here is reputation, not assignment. Pioneers are welcome; lurkers are noted.' },
    ];

    function rotateQuote() {
        const el = document.getElementById('ticker');
        const q = QUOTES[Math.floor(Math.random() * QUOTES.length)];
        el.style.opacity = '0';
        setTimeout(() => {
            el.innerHTML = `"${q.text}"<span class="who">— mindX · ${q.who}</span>`;
            el.style.opacity = '1';
        }, 350);
    }
    rotateQuote();
    setInterval(rotateQuote, 7200);

    // ─── Card rendering ─────────────────────────────────────────────────
    function renderCards(canAccess) {
        const grid = document.getElementById('cardsGrid');
        grid.innerHTML = '';
        let unlocked = 0;
        for (const card of CARDS) {
            const locked = !canAccess.includes(card.id);
            if (!locked) unlocked++;
            const a = document.createElement('a');
            a.className = 'card' + (locked ? ' locked' : '');
            a.dataset.tier = card.tier;
            a.dataset.id = card.id;
            a.style.backgroundImage = `url(${card.gfx})`;
            if (locked) {
                a.removeAttribute('href');
                a.title = 'sign in to unlock';
            } else {
                a.href = card.href;
                if (card.href.startsWith('http') || card.id === 'shadow_overlord_login') {
                    // shadow-overlord stays same-tab so localStorage signal works on return
                }
            }
            const label = document.createElement('div');
            label.className = 'label';
            label.innerHTML = card.title + `<span class="sub">${card.sub}</span>`;
            a.appendChild(label);
            grid.appendChild(a);
        }
        document.getElementById('gridHint').textContent =
            `${unlocked} unlocked · ${CARDS.length - unlocked} locked`;
    }

    // ─── Permissions refresh ────────────────────────────────────────────
    function shortAddr(a) { return a ? `${a.slice(0,6)}…${a.slice(-4)}` : ''; }

    async function refreshPermissions() {
        // Resolve the wallet to ask permissions for:
        //   1. valid session token  → call /users/session/validate → use returned wallet
        //   2. else mindx_shadow_address (set by /shadow-overlord after sovereign sign-in)
        //   3. else anonymous
        let wallet = 'anonymous';
        const token = localStorage.getItem('mindx_session_token');
        if (token) {
            try {
                const r = await fetch(`${apiBase}/users/session/validate`, {
                    headers: { 'X-Session-Token': token }
                });
                if (r.ok) {
                    const j = await r.json();
                    wallet = (j.wallet_address || 'anonymous').toLowerCase();
                } else {
                    // expired/invalid — drop it
                    localStorage.removeItem('mindx_session_token');
                    localStorage.removeItem('mindx_session_expires_at');
                }
            } catch {}
        }
        if (wallet === 'anonymous') {
            const sov = (localStorage.getItem('mindx_shadow_address') || '').trim();
            if (sov) wallet = sov.toLowerCase();
        }

        // Hit the perms endpoint
        let perms;
        try {
            const r = await fetch(`${apiBase}/users/${encodeURIComponent(wallet)}/permissions`);
            perms = await r.json();
        } catch (e) {
            console.warn('permissions fetch failed; falling back to anonymous', e);
            perms = { tier: 'public', is_shadow_overlord: false, can_access: ['automindx','docs','shadow_overlord_login','login'], dojo_rank:'novice', bona_fide_balance:0 };
        }

        // Tier badge
        const badge = document.getElementById('tierBadge');
        badge.dataset.tier = perms.tier;
        badge.textContent = perms.tier.replace(/_/g, ' ');

        // Wallet chip
        const walletChip = document.getElementById('walletChip');
        if (perms.wallet_address && perms.wallet_address !== 'anonymous') {
            walletChip.hidden = false;
            walletChip.textContent = shortAddr(perms.wallet_address);
        } else {
            walletChip.hidden = true;
        }

        // Rank / BONA FIDE chips (badges only — non-gating)
        const rankChip = document.getElementById('rankChip');
        if (perms.dojo_rank && perms.dojo_rank !== 'novice') {
            rankChip.hidden = false; rankChip.textContent = '⚔ ' + perms.dojo_rank;
        } else { rankChip.hidden = true; }
        const bfChip = document.getElementById('bfChip');
        if (perms.bona_fide_balance && perms.bona_fide_balance > 0) {
            bfChip.hidden = false; bfChip.textContent = '✦ BONA FIDE ' + perms.bona_fide_balance;
        } else { bfChip.hidden = true; }

        renderCards(perms.can_access || []);
    }
    window.refreshPermissions = refreshPermissions;

    // ─── Bootstrap ──────────────────────────────────────────────────────
    refreshPermissions();
    // Re-check perms when tab regains focus (caught the sovereign-sign-in-elsewhere case)
    window.addEventListener('focus', refreshPermissions);
    window.addEventListener('storage', refreshPermissions);
    </script>
</body>
</html>
