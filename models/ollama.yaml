# Ollama Model Configuration
# Primary: GPU server at 10.0.0.155:18080 (set here; used by api/ollama, llm_factory, mindXagent, admin tab).
# Fallback: localhost:11434 when primary is unreachable.
# Test: python scripts/test_ollama_connection.py  (uses this base_url when no arg)
# Override: MINDX_LLM__OLLAMA__BASE_URL env or llm.ollama.base_url in data/config.
# Resilience: Ollama is the failsafe/fallback inference (see llm/RESILIENCE.md). Keep enabled: true.

provider: ollama
display_name: Ollama (Local GPU)
enabled: true
base_url: http://10.0.0.155:18080
fallback_url: http://localhost:11434

# Connection settings
timeout: 120.0
connect_timeout: 10.0
sock_read_timeout: 60.0

# Rate limits (local server, typically high limits)
rate_limits:
  requests_per_minute: 1000
  requests_per_day: 1000000
  tokens_per_minute: 10000000
  tokens_per_day: 1000000000

# Default model settings
default_model: qwen3:1.7b
keep_alive: 10m  # Keep models loaded in memory

# Available models (discovered dynamically). task_scores align with ModelSelector TaskType for graded inference hierarchy.
models:
  - name: llama3:8b
    display_name: Llama 3 8B
    context_size: 8192
    recommended: true
    task_scores:
      reasoning: 0.75
      code_generation: 0.78
      simple_chat: 0.88
      data_analysis: 0.72
      writing: 0.80
      speed_sensitive: 0.85
  - name: llama3:70b
    display_name: Llama 3 70B
    context_size: 8192
    recommended: false
    task_scores:
      reasoning: 0.90
      code_generation: 0.88
      simple_chat: 0.92
      data_analysis: 0.88
      writing: 0.90
      speed_sensitive: 0.60
  - name: mistral-nemo:latest
    display_name: Mistral Nemo
    context_size: 32768
    recommended: true
    task_scores:
      reasoning: 0.82
      code_generation: 0.80
      simple_chat: 0.90
      data_analysis: 0.82
      writing: 0.85
      speed_sensitive: 0.88
  - name: mistral-small-latest
    display_name: Mistral Small
    context_size: 32768
    recommended: true
    task_scores:
      reasoning: 0.85
      code_generation: 0.83
      simple_chat: 0.92
      data_analysis: 0.84
      writing: 0.86
      speed_sensitive: 0.86

# Model selection preferences
model_selection:
  default_temperature: 0.7
  default_max_tokens: 2048
  use_chat_endpoint: true  # Prefer /api/chat over /api/generate

# Features (per Ollama docs 2026-04-11)
# Detection: use /api/show capabilities array for dynamic detection
# These are defaults for local models; cloud models may have more
features:
  streaming: true
  embeddings: true
  function_calling: true   # qwen3 supports tool calling
  vision: false            # requires gemma3/llava locally
  tool_use: true           # same as function_calling
  thinking: true           # deepseek-r1, qwen3 support think parameter
  structured_outputs: true # format parameter with JSON schema
  web_search: false        # requires OLLAMA_API_KEY (cloud feature)

# Cloud configuration (Ollama cloud free tier)
cloud:
  enabled: false  # Set to true when OLLAMA_API_KEY is configured
  host: https://ollama.com
  api_key_env: OLLAMA_API_KEY
  rate_limits:
    requests_per_minute: 10
    requests_per_hour: 150
  # Cloud models for heavy tasks (discovered dynamically)
  # See docs/ollama/cloud/model_search.md for programmatic discovery
  preferred_models:
    reasoning: deepseek-v3.2
    coding: qwen3-coder-next
    general: qwen3.5:27b
    multimodal: gemma4:31b

# Modelfile schema alignment
# The Ollama Modelfile is the canonical schema for model collection.
# /api/show returns capabilities, template, parameters — this feeds
# HierarchicalModelScorer and agent-model alignment toward Chimaiera.
# See docs/ollama/setup/modelfile.md for full reference.
modelfile_schema:
  detect_capabilities: true  # Auto-detect via /api/show on discovery
  score_from_feedback: true  # HierarchicalModelScorer updates task_scores

# GPU configuration
gpu:
  enabled: true
  server_host: 10.0.0.155
  server_port: 18080
  fallback_to_cpu: true

# Health check
health_check:
  enabled: true
  interval_seconds: 30
  endpoint: /api/tags
