# Ollama Model Configuration
# Primary: GPU server at 10.0.0.155:18080 (set here; used by api/ollama, llm_factory, mindXagent, admin tab).
# Fallback: localhost:11434 when primary is unreachable.
# Test: python scripts/test_ollama_connection.py  (uses this base_url when no arg)
# Override: MINDX_LLM__OLLAMA__BASE_URL env or llm.ollama.base_url in data/config.
# Resilience: Ollama is the failsafe/fallback inference (see llm/RESILIENCE.md). Keep enabled: true.

provider: ollama
display_name: Ollama (Local GPU)
enabled: true
base_url: http://10.0.0.155:18080
fallback_url: http://localhost:11434

# Connection settings
timeout: 120.0
connect_timeout: 10.0
sock_read_timeout: 60.0

# Rate limits (local server, typically high limits)
rate_limits:
  requests_per_minute: 1000
  requests_per_day: 1000000
  tokens_per_minute: 10000000
  tokens_per_day: 1000000000

# Default model settings
default_model: qwen3:1.7b
keep_alive: 10m  # Keep models loaded in memory

# Available models — ONLY models actually servable on this box (2-core/8GB).
# Local small models = the CPU pillar; gpt-oss:120b-cloud = the Ollama Cloud
# pillar (remote, 0 local RAM/CPU, free tier, returns real content) and is the
# top reasoning pick so ModelSelector / get_handler_and_model_for_purpose routes
# planning to it instead of a model nobody is serving. (Was: fictional
# llama3:70b/8b + mistral-* that aren't pulled here — they ranked top and the
# planner selected a 70B that doesn't exist → empty plans → 0 campaign success.)
models:
  - name: gpt-oss:120b-cloud
    display_name: GPT-OSS 120B (Ollama Cloud — reasoning pillar)
    context_size: 131072
    recommended: true
    task_scores:
      reasoning: 0.95
      code_generation: 0.90
      simple_chat: 0.84
      data_analysis: 0.92
      writing: 0.88
      speed_sensitive: 0.70
  - name: granite4.1:3b
    display_name: Granite 4.1 3B (local)
    context_size: 131072
    recommended: true
    task_scores:
      reasoning: 0.62
      code_generation: 0.60
      simple_chat: 0.78
      data_analysis: 0.62
      writing: 0.65
      speed_sensitive: 0.82
  - name: qwen3:4b
    display_name: Qwen3 4B (local)
    context_size: 32768
    recommended: true
    task_scores:
      reasoning: 0.70
      code_generation: 0.68
      simple_chat: 0.82
      data_analysis: 0.70
      writing: 0.72
      speed_sensitive: 0.80
  - name: qwen3:1.7b
    display_name: Qwen3 1.7B (local — default/heartbeat)
    context_size: 32768
    recommended: true
    task_scores:
      reasoning: 0.55
      code_generation: 0.52
      simple_chat: 0.80
      data_analysis: 0.55
      writing: 0.60
      speed_sensitive: 0.92
  - name: deepseek-r1:1.5b
    display_name: DeepSeek-R1 1.5B (local — thinking)
    context_size: 32768
    recommended: true
    task_scores:
      reasoning: 0.58
      code_generation: 0.50
      simple_chat: 0.65
      data_analysis: 0.56
      writing: 0.55
      speed_sensitive: 0.88
  - name: deepseek-coder:1.3b
    display_name: DeepSeek-Coder 1.3B (local — code)
    context_size: 16384
    recommended: true
    task_scores:
      reasoning: 0.45
      code_generation: 0.72
      simple_chat: 0.55
      data_analysis: 0.45
      writing: 0.40
      speed_sensitive: 0.90
  - name: qwen3:0.6b
    display_name: Qwen3 0.6B (local — fast/heartbeat)
    context_size: 32768
    recommended: true
    task_scores:
      reasoning: 0.40
      code_generation: 0.38
      simple_chat: 0.70
      data_analysis: 0.40
      writing: 0.45
      speed_sensitive: 0.98

# Model selection preferences
model_selection:
  default_temperature: 0.7
  default_max_tokens: 2048
  use_chat_endpoint: true  # Prefer /api/chat over /api/generate

# Features (per Ollama docs 2026-04-11)
# Detection: use /api/show capabilities array for dynamic detection
# These are defaults for local models; cloud models may have more
features:
  streaming: true
  embeddings: true
  function_calling: true   # qwen3 supports tool calling
  vision: false            # requires gemma3/llava locally
  tool_use: true           # same as function_calling
  thinking: true           # deepseek-r1, qwen3 support think parameter
  structured_outputs: true # format parameter with JSON schema
  web_search: false        # requires OLLAMA_API_KEY (cloud feature)

# Cloud configuration (Ollama cloud free tier)
cloud:
  enabled: false  # Set to true when OLLAMA_API_KEY is configured
  host: https://ollama.com
  api_key_env: OLLAMA_API_KEY
  rate_limits:
    requests_per_minute: 10
    requests_per_hour: 150
  # Cloud models for heavy tasks (discovered dynamically)
  # See docs/ollama/cloud/model_search.md for programmatic discovery
  preferred_models:
    reasoning: deepseek-v3.2
    coding: qwen3-coder-next
    general: qwen3.5:27b
    multimodal: gemma4:31b

# Modelfile schema alignment
# The Ollama Modelfile is the canonical schema for model collection.
# /api/show returns capabilities, template, parameters — this feeds
# HierarchicalModelScorer and agent-model alignment toward Chimaiera.
# See docs/ollama/setup/modelfile.md for full reference.
modelfile_schema:
  detect_capabilities: true  # Auto-detect via /api/show on discovery
  score_from_feedback: true  # HierarchicalModelScorer updates task_scores

# GPU configuration
gpu:
  enabled: true
  server_host: 10.0.0.155
  server_port: 18080
  fallback_to_cpu: true

# Health check
health_check:
  enabled: true
  interval_seconds: 30
  endpoint: /api/tags
