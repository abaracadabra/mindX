[server]
protocol = http
http_port = 3000
domain = grafana.pythai.net
root_url = https://grafana.pythai.net/
serve_from_sub_path = false

[security]
admin_user = admin
disable_initial_admin_creation = false
cookie_secure = true
cookie_samesite = lax
content_security_policy = true
strict_transport_security = true

[users]
allow_sign_up = false
auto_assign_org = true
auto_assign_org_role = Viewer
default_theme = dark

[auth]
disable_login_form = false
disable_signout_menu = false

[auth.anonymous]
enabled = false

[analytics]
reporting_enabled = false
check_for_updates = false

[log]
mode = console
level = info

[live]
max_connections = 100

[unified_alerting]
enabled = false

[alerting]
enabled = false

[explore]
enabled = true
