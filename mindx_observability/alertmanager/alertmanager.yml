global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'mindx-alerts@gmail.com'
  smtp_auth_username: 'mindx-alerts@gmail.com'
  smtp_auth_password_file: '/etc/alertmanager/smtp_app_password'
  smtp_require_tls: true

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'email-ops'

receivers:
  - name: 'email-ops'
    email_configs:
      - to: 'tokindex@gmail.com'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'page'
      alertname: 'HighMemoryUsage'
    target_match:
      severity: 'page'
      alertname: 'PrometheusSelfDown'
    equal: ['project']
