<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName grafana.pythai.net
    ServerAdmin mastermind@pythai.net

    SSLEngine on
    SSLCertificateFile      /etc/letsencrypt/live/grafana.pythai.net/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/grafana.pythai.net/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains"
    Header always set X-Content-Type-Options "nosniff"

    # Grafana handles its own auth — no Apache Basic Auth here

    ProxyPreserveHost On
    ProxyRequests Off

    # Grafana Live (SSE / WebSocket) for live tail — required or "Connection lost" toast loops
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /api/live/ws  ws://127.0.0.1:3001/api/live/ws  [P,L]
    RewriteCond %{HTTP:Upgrade} !=websocket [NC]
    RewriteRule /api/live/ws  http://127.0.0.1:3001/api/live/ws [P,L]

    ProxyPass        /api/live/ws ws://127.0.0.1:3001/api/live/ws
    ProxyPassReverse /api/live/ws ws://127.0.0.1:3001/api/live/ws

    ProxyPass        / http://127.0.0.1:3001/
    ProxyPassReverse / http://127.0.0.1:3001/

    ErrorLog  ${APACHE_LOG_DIR}/grafana.pythai.net-error.log
    CustomLog ${APACHE_LOG_DIR}/grafana.pythai.net-access.log combined
</VirtualHost>
</IfModule>
