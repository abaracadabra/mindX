<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName netdata.pythai.net
    ServerAdmin mastermind@pythai.net

    SSLEngine on
    SSLCertificateFile      /etc/letsencrypt/live/netdata.pythai.net/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/netdata.pythai.net/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "no-referrer"

    # Operator-only — netdata OSS has no native auth
    <Location />
        AuthType Basic
        AuthName "mindX netdata (operator)"
        AuthUserFile /etc/apache2/htpasswd/netdata.htpasswd
        Require valid-user
    </Location>

    ProxyPreserveHost On
    ProxyRequests Off

    # WebSocket upgrade for real-time streaming charts (netdata uses /host/stream + SSE)
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /(.*) ws://127.0.0.1:19999/$1 [P,L]

    ProxyPass        / http://127.0.0.1:19999/
    ProxyPassReverse / http://127.0.0.1:19999/

    ErrorLog  ${APACHE_LOG_DIR}/netdata.pythai.net-error.log
    CustomLog ${APACHE_LOG_DIR}/netdata.pythai.net-access.log combined
</VirtualHost>
</IfModule>
