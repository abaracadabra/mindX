<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName alerts.pythai.net
    ServerAdmin mastermind@pythai.net

    SSLEngine on
    SSLCertificateFile      /etc/letsencrypt/live/alerts.pythai.net/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/alerts.pythai.net/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "no-referrer"

    <Location />
        AuthType Basic
        AuthName "mindX Alertmanager (operator)"
        AuthUserFile /etc/apache2/htpasswd/alerts.htpasswd
        Require valid-user
    </Location>

    ProxyPreserveHost On
    ProxyRequests Off
    ProxyPass        / http://127.0.0.1:9093/
    ProxyPassReverse / http://127.0.0.1:9093/

    ErrorLog  ${APACHE_LOG_DIR}/alerts.pythai.net-error.log
    CustomLog ${APACHE_LOG_DIR}/alerts.pythai.net-access.log combined
</VirtualHost>
</IfModule>
