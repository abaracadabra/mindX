# mindX netdata.conf — Phase 1.2 minimal config
# Smartphone-class footprint: 1d retention, 127.0.0.1 bind, no cloud, slim plugins.
# Apache reverse-proxies https://netdata.pythai.net → 127.0.0.1:19999 with Basic Auth.

[global]
    # 1 day retention — smartphone-class, not week-long TSDB
    # The dbengine page cache is the dominant RAM eater
    page cache size = 32
    dbengine multihost disk space MB = 256
    update every = 2

    # Bind locally only — Apache is the TLS edge
    default port = 19999
    bind to = 127.0.0.1

    # Disable phone-home / cloud
    cloud enabled = no
    anonymous statistics = no

    # Run as default container user
    run as user = netdata

    # OOM behavior — let kernel handle it via OOMScoreAdjust in the Quadlet
    OOM score = 0

[web]
    web files owner = root
    web files group = netdata
    bearer token protection = no
    allow connections from = localhost 127.0.0.1 ::1

[plugins]
    # Disable heavy plugins we don't need
    apps = yes
    cgroups = yes
    diskspace = yes
    proc = yes
    tc = no
    idlejitter = no
    nfacct = no
    xenstat = no
    perf = no
    slabinfo = no
    python.d = yes
    go.d = yes
    node.d = no
    charts.d = no
    fping = no
    ioping = no
    ebpf = no

[plugin:proc]
    # Keep only the essential collectors
    /proc/stat = yes
    /proc/meminfo = yes
    /proc/loadavg = yes
    /proc/diskstats = yes
    /proc/net/dev = yes
    /proc/net/sockstat = yes
    /proc/net/snmp = yes
    /proc/uptime = yes
    /proc/pressure = yes
    /proc/vmstat = yes
    /proc/sys/kernel/random/entropy_avail = yes
    /proc/sys/fs/file-nr = yes
    /proc/spl/kstat/zfs/arcstats = no
    /sys/class/infiniband = no
    /sys/class/power_supply = no
    /sys/devices/system/edac/mc = no
    /sys/fs/btrfs = no

[plugin:apps]
    update every = 5

[health]
    enabled = yes
    in memory max health log entries = 256
    run at least every seconds = 10
    rotate log every lines = 1000
