# mindX python.d.conf — Phase 1.2
# Disable plugins we don't need to cut ~30 MB resident.

enabled: yes
default_run: no    # opt-in only; nothing runs unless explicitly enabled below

# What we explicitly want
nginx: no
apache: no
postgres: no
mysql: no
redis: no

# Everything else stays off by default_run: no above.
# To enable a specific collector, add `<name>: yes` here.
